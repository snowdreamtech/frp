---
# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj

version: 2
project_name: template

report_sizes: true
archives:
  - id: template
    formats: [tar.gz]
    # This name template makes the OS and Arch compatible with uname and includes the version.
    name_template: >-
      {{- .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end -}}
    # Wraps the files inside a top-level directory within the archive to prevent tarbombing (Best Practice)
    wrap_in_directory: true
    builds_info:
      group: root
      owner: root
      mtime: "{{ .CommitDate }}"
    # Use zip for windows archives
    format_overrides:
      - goos: windows
        formats: [zip]
    # Include all relevant standard documentation arrays using Globs
    files:
      - src: "LICENSE*"
        info:
          owner: root
          group: root
          mtime: "{{ .CommitDate }}"
      - src: "README*"
        info:
          owner: root
          group: root
          mtime: "{{ .CommitDate }}"
      - src: "CHANGELOG*"
        info:
          owner: root
          group: root
          mtime: "{{ .CommitDate }}"

snapshot:
  version_template: SNAPSHOT-{{ .Commit }}

checksum:
  name_template: "checksums.txt"

release:
  name_template: "{{ .Tag }}"
  prerelease: auto
  github:
    owner: snowdreamtech
    name: template
  header: |
    **Snowdream Tech AI IDE Template** is an enterprise-grade, foundational template designed for multi-AI IDE collaboration.

    This repository serves as a **Single Source of Truth** for AI agent rules, workflows, and project configurations, supporting over 50 different AI-assisted IDEs with massive multi-language support.

source:
  enabled: true
  name_template: "{{ .ProjectName }}-{{ .Version }}-source"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "(?i)^test"
      - "(?i)^ci"
      - "(?i)^build"
      - "(?i)^style"
      - "(?i)^revert"
      - "(?i)^chore"
      - "(?i)^deps"
      - "^Merge pull request"
      - "^Merge remote-tracking branch"
      - "^Merge branch"
      - "merge conflict"
      - "^WIP"
      - "^\\[skip ci\\]"
      - "^Bump version"
  groups:
    - title: "🚀 Features"
      regexp: "^.*(?i)feat[(\\w)]*:+.*$"
      order: 100
    - title: "🐛 Bug Fixes"
      regexp: "^.*(?i)fix[(\\w)]*:+.*$"
      order: 200
    - title: "⚡️ Performance Improvements"
      regexp: "^.*(?i)perf[(\\w)]*:+.*$"
      order: 300
    - title: "🛠 Refactoring"
      regexp: "^.*(?i)refactor[(\\w)]*:+.*$"
      order: 400
    - title: "🛡️ Security Updates"
      regexp: "^.*(?i)(sec|security)[(\\w)]*:+.*$"
      order: 600
    - title: "📖 Documentation"
      regexp: "^.*(?i)docs[(\\w)]*:+.*$"
      order: 700
    - title: "♻️ Miscellaneous Chores"
      order: 9999

sboms:
  # Generate SBOMs for all release artifacts: archives (tar.gz/zip) and Linux packages (deb/rpm/apk/archlinux)
  - id: archive
    artifacts: archive
  - id: package
    artifacts: package

signs:
  - cmd: cosign
    signature: "${artifact}.sigstore.json"
    output: '{{ not (isEnvSet "CI") }}'
    artifacts: checksum
    args:
      - sign-blob
      - "--bundle=${signature}"
      - "${artifact}"
      - --yes # Enables keyless signing via OIDC token
