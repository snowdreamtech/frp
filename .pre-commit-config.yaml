---
# .pre-commit-config.yaml - Second Line of Defense
#
# -- Triple Guarantee ----------------------------------------------
# This configuration implements the "Incremental Shift-Left" philosophy.
# It ensures that all staged changes meet the project's quality standards BEFORE
# they are committed to the repository.
#
# Layers of Defense:
#   1. Agent/Dev Auto-fix: Immediate local correction (eslint --fix, etc.).
#   2. Git Commit Intercept (THIS FILE): Incremental scan of staged files.
#   3. CI/CD Strict Checks: Authoritative full-repository audit.
#
# Setup (Local Machine):
#   sh scripts/setup.sh hooks
#
# Manual Run:
#   pre-commit run --all-files
#
# ------------------------------------------------------------------------------

fail_fast: false
default_stages: [pre-commit, pre-merge-commit]
exclude: |
  (?x)^(
    \.git/|
    node_modules/|
    \.venv/|venv/|env/|
    vendor/|
    dist/|build/|out/|target/|
    \.next/|\.nuxt/|\.output/|
    __pycache__/|
    \.specify/|
    \.tmp/|tmp/|
    \.(venv|idx|continue|history|vscode-test)/.*|
    \.aider\.conf\.yml
  )

repos:
  - repo: local
    hooks:
      # -- Git Hygiene (Incremental) ------------------------------------------
      - id: trailing-whitespace
        name: trim trailing whitespace
        entry: |
          python3 -c "
          import sys, re, os
          modified = []
          for f in sys.argv[1:]:
              if os.path.isfile(f) and os.path.getsize(f) < 2*1024*1024:
                  with open(f, 'rb') as fh: content = fh.read()
                  new_content = re.sub(b'[ \t]+(?=\r?\n|$)', b'', content)
                  if content != new_content:
                      with open(f, 'wb') as fh: fh.write(new_content)
                      modified.append(f)
          for f in modified: print(f'Fixing trailing whitespace in: {f}')
          sys.exit(1 if modified else 0)
          "
        language: system
        types: [text]
        exclude: |
          (?x)^(
            \.md$|.*\.lock$|go\.sum$|
            (\.github/agents|agent|agents|roo|claude|qwen|amazonq|augment|bob|codebuddy|codex|kilocode|opencode|qoder|shai|cursor|windsurf|pearai|pi|pochi|supermaven|tabnine|trae|vibe|void|zed|zencoder|openhands|cody|coderabbit|aide|cline|clinerules|cursorrules|pr_agent.toml)/.*
          )
        stages: [pre-commit, pre-merge-commit]
        description: "Standardize text hygiene by removing trailing whitespace."

      - id: end-of-file-fixer
        name: fix end of files
        entry: |
          python3 -c "
          import sys, os
          modified = []
          for f in sys.argv[1:]:
              if os.path.isfile(f) and os.path.getsize(f) < 2*1024*1024:
                  with open(f, 'rb') as fh: content = fh.read()
                  if not content: continue
                  stripped = content.rstrip(b'\r\n')
                  newline = b'\r\n' if b'\r\n' in content else b'\n'
                  new_content = stripped + newline
                  if content != new_content:
                      with open(f, 'wb') as fh: fh.write(new_content)
                      modified.append(f)
          for f in modified: print(f'Fixing end of file in: {f}')
          sys.exit(1 if modified else 0)
          "
        language: system
        types: [text]
        exclude: |
          (?x)^(
            .*\.lock$|go\.sum$|
            (\.github/agents|agent|agents|roo|claude|qwen|amazonq|augment|bob|codebuddy|codex|kilocode|opencode|qoder|shai|cursor|windsurf|pearai|pi|pochi|supermaven|tabnine|trae|vibe|void|zed|zencoder|openhands|cody|coderabbit|aide|cline|clinerules|cursorrules|pr_agent.toml)/.*
          )
        stages: [pre-commit, pre-merge-commit]
        description: "Ensure that files end with a single newline character."

      - id: check-added-large-files
        name: check for added large files
        entry: |
          python3 -c "
          import sys, os
          large_files = [f for f in sys.argv[1:] if os.path.isfile(f) and os.path.getsize(f) > 1024*1024]
          for f in large_files: print(f'File too large (>1MB): {f}')
          sys.exit(1 if large_files else 0)
          "
        language: system
        exclude: |
          (?x)^(
            examples/plugin-go/unirtm-plugin-example|
            docs/tapes/demo\.gif
          )
        stages: [pre-commit, pre-merge-commit]
        description: "Prevent large files (>1MB) from being committed."

      - id: check-merge-conflict
        name: check for merge conflicts
        entry: |
          python3 -c "
          import sys, os, re
          conflicts = []
          for f in sys.argv[1:]:
              if os.path.isfile(f) and os.path.getsize(f) < 2*1024*1024:
                  with open(f, 'r', errors='ignore') as fh:
                      for line in fh:
                          if re.match(r'^(<<<<<<<|=======|>>>>>>>|\|\|\|\|\|\|\|)', line):
                              conflicts.append(f)
                              break
          for f in conflicts: print(f'Merge conflict markers found in: {f}')
          sys.exit(1 if conflicts else 0)
          "
        language: system
        types: [text]
        stages: [pre-commit, pre-merge-commit]
        description: "Intercept files containing git merge conflict markers."

      - id: check-case-conflict
        name: check for case conflicts
        entry: |
          python3 -c "
          import sys, os
          dirs = set(os.path.dirname(f) or '.' for f in sys.argv[1:])
          clashing = []
          for d in dirs:
              files = os.listdir(d)
              freq = {}
              for f in files:
                  low = f.lower()
                  freq[low] = freq.get(low, 0) + 1
              for f in files:
                  if freq[f.lower()] > 1: clashing.append(os.path.join(d, f))
          for f in sorted(set(clashing)): print(f'Case collision: {f}')
          sys.exit(1 if clashing else 0)
          "
        language: system
        stages: [pre-commit, pre-merge-commit]
        description: "Verify that filenames are unique across case-insensitive filesystems."

      - id: check-symlinks
        name: check for broken symlinks
        entry: |
          python3 -c "
          import sys, os
          broken = [f for f in sys.argv[1:] if os.path.islink(f) and not os.path.exists(f)]
          for f in broken: print(f'Broken symlink: {f}')
          sys.exit(1 if broken else 0)
          "
        language: system
        stages: [pre-commit, pre-merge-commit]
        description: "Ensure symlinks point to existing locations."

      - id: check-utf8-bom
        name: check for utf8 bom
        entry: |
          python3 -c "
          import sys, os
          found = []
          for f in sys.argv[1:]:
              if os.path.isfile(f) and os.path.getsize(f) > 3:
                  with open(f, 'rb') as fh:
                      if fh.read(3) == b'\xef\xbb\xbf': found.append(f)
          for f in found: print(f'Illegal UTF-8 BOM detected: {f}')
          sys.exit(1 if found else 0)
          "
        language: system
        types: [text]
        exclude: scripts/sync-labels\.ps1$
        description: "Prevent illegal Byte Order Mark (BOM) in UTF-8 files."

      # -- Data & Configuration Hygiene ---------------------------------------
      - id: check-json
        name: check json well-formedness
        entry: |
          python3 -c "
          import sys, os, json
          errors = []
          for f in sys.argv[1:]:
              if os.path.isfile(f) and os.path.getsize(f) < 2*1024*1024:
                  try:
                      with open(f, 'r', encoding='utf-8') as fh: json.load(fh)
                  except Exception as e: errors.append(f'{f} ({e})')
          for e in errors: print(f'Malformed JSON: {e}')
          sys.exit(1 if errors else 0)
          "
        language: system
        types: [json]
        exclude: '\.vscode/.*\.json$'
        description: "Verify that JSON files are well-formed."

      - id: check-toml
        name: check toml well-formedness
        entry: |
          python3 -c "
          import sys, os
          try:
              import tomllib as toml
          except ImportError:
              try: import tomli as toml
              except ImportError: sys.exit(0)
          errors = []
          for f in sys.argv[1:]:
              if os.path.isfile(f) and os.path.getsize(f) < 2*1024*1024:
                  try:
                      with open(f, 'rb') as fh: toml.load(fh)
                  except Exception as e: errors.append(f'{f} ({e})')
          for e in errors: print(f'Malformed TOML: {e}')
          sys.exit(1 if errors else 0)
          "
        language: system
        files: '\.toml$'
        description: "Verify that TOML files are well-formed (requires Python 3.11+ or tomllib)."

      - id: check-ini
        name: check ini well-formedness
        entry: |
          python3 -c "
          import sys, os, configparser
          errors = []
          for f in sys.argv[1:]:
              if os.path.isfile(f) and os.path.getsize(f) < 1024*1024:
                  try:
                      cp = configparser.ConfigParser()
                      cp.read(f, encoding='utf-8')
                  except Exception as e: errors.append(f'{f} ({e})')
          for e in errors: print(f'Malformed INI: {e}')
          sys.exit(1 if errors else 0)
          "
        language: system
        files: '\.(ini|editorconfig|properties)$'
        exclude: '\.(editorconfig|\.vscode/.*\.json)$'
        description: "Verify that INI and property files are well-formed."

      - id: check-jsonc
        name: check jsonc well-formedness
        entry: |
          python3 -c "
          import sys, os, json, re
          errors = []
          for f in sys.argv[1:]:
              if os.path.isfile(f) and os.path.getsize(f) < 2*1024*1024:
                  try:
                      with open(f, 'r', encoding='utf-8') as fh:
                          content = fh.read()
                          content = re.sub(r'(?<![:])//.*', '', content)
                          content = re.sub(r'/\*.*?\*/', '', content, flags=re.S)
                          content = re.sub(r',([ \t\r\n]*[}\]])', r'\1', content)
                          json.loads(content)
                  except Exception as e: errors.append(f'{f} ({e})')
          for e in errors: print(f'Malformed JSONC: {e}')
          sys.exit(1 if errors else 0)
          "
        language: system
        files: '\.(jsonc|json5)$|tsconfig.*\.json$|devcontainer\.json$|\.vscode/.*\.json$'
        description: "Verify that JSON with Comments (JSONC/JSON5) files are well-formed."

      - id: prettier
        name: prettier format
        language: system
        entry: unirtm hook-exec prettier --write
        types_or:
          - json
          - yaml
          - vue
          - javascript
          - jsx
          - ts
          - tsx
          - graphql
          - sql
          - html
          - css
          - markdown
          - astro
          - svelte
        exclude: |
          (?x)^(\.github/agents|agent|agents|roo|claude|qwen|amazonq|augment|bob|codebuddy|codex|kilocode|opencode|qoder|shai|cursor|windsurf|pearai|pi|pochi|supermaven|tabnine|trae|vibe|void|zed|zencoder|openhands|cody|coderabbit|aide|cline|clinerules|cursorrules|pr_agent.toml)/.*
        description: "Format web-standard file types using Prettier (including Astro/Svelte)."

      - id: zizmor
        name: zizmor security audit
        language: system
        entry: unirtm hook-exec zizmor --config .zizmor.yml --no-online-audits
        files: ^\.github/workflows/.*\.yml$
        description: "Audit GitHub Actions workflows for security vulnerabilities (offline; full online audit runs in CI audit job)."

      - id: shfmt
        name: shfmt format
        language: system
        entry: unirtm hook-exec shfmt -w -s -i 2
        types: [shell]
        exclude: |
          (?x)^(\.github/agents|agent|agents|roo|claude|qwen|amazonq|augment|bob|codebuddy|codex|kilocode|opencode|qoder|shai|cursor|windsurf|pearai|pi|pochi|supermaven|tabnine|trae|vibe|void|zed|zencoder|openhands|cody|coderabbit|aide|cline|clinerules|cursorrules|pr_agent.toml)/.*
        description: "Format shell scripts according to POSIX standards."

      - id: taplo
        name: taplo format
        language: system
        entry: unirtm hook-exec taplo format
        types: [toml]
        exclude: |
          (?x)^(\.github/agents|agent|agents|roo|claude|qwen|amazonq|augment|bob|codebuddy|codex|kilocode|opencode|qoder|shai|cursor|windsurf|pearai|pi|pochi|supermaven|tabnine|trae|vibe|void|zed|zencoder|openhands|cody|coderabbit|aide|cline|clinerules|cursorrules|pr_agent.toml)/.*
        description: "Format TOML files using Taplo."

      - id: gitleaks
        name: gitleaks quality check
        language: system
        entry: unirtm hook-exec gitleaks protect --verbose --redact --staged --config .gitleaks.toml
        always_run: true
        pass_filenames: false
        description: "Prevent secret leaks using Gitleaks."

      - id: detect-private-key
        name: detect private keys
        entry: |
          python3 -c "
          import sys, os, re
          pattern = re.compile(b'-----BEGIN ' + b'.*PRIVATE KEY-----')
          found = []
          for f in sys.argv[1:]:
              if os.path.isfile(f) and os.path.getsize(f) < 1024*1024:
                  with open(f, 'rb') as fh:
                      if pattern.search(fh.read()): found.append(f)
          for f in found: print(f'Private key detected: {f}')
          sys.exit(1 if found else 0)
          "
        language: system
        types: [text]
        exclude: '\.pre-commit-config\.yaml$'
        description: "Prevent accidental staging of sensitive private keys."

      - id: hadolint
        name: hadolint quality check
        language: system
        entry: unirtm hook-exec hadolint
        files: "Dockerfile.*"
        description: "Audit Dockerfiles for best practices and security vulnerabilities."

      # -- Deep Security & Vulnerability Audits -------------------------------
      - id: osv-scanner
        name: osv-scanner vulnerability audit
        language: system
        entry: unirtm hook-exec osv_scanner --config .osv-scanner.toml --call-analysis=all --format table --lockfile
        files: '(pnpm-lock\.yaml|go\.mod|Cargo\.lock|package-lock\.json|yarn\.lock|bun\.lockb)$'
        description: "Audit project dependencies for known vulnerabilities using Google OSV-Scanner."
        stages: [manual, pre-push] # Skip in local pre-commit, run in CI or manually

      - id: trivy
        name: trivy security scan
        language: system
        entry: unirtm hook-exec trivy fs . --scanners vuln,misconfig,secret --skip-dirs internal/addlicense/testdata --db-repository public.ecr.aws/aquasecurity/trivy-db --java-db-repository public.ecr.aws/aquasecurity/trivy-java-db:1 --checks-bundle-repository public.ecr.aws/aquasecurity/trivy-checks --timeout 15m --exit-code 1 --severity HIGH,CRITICAL
        always_run: true
        pass_filenames: false
        stages: [manual, pre-push] # Skip in local pre-commit, run in CI or manually
        description: "Comprehensive security scan for vulnerabilities, misconfigurations, and secrets using Trivy."

      - id: checkov
        name: checkov iac security audit
        language: system
        entry: unirtm hook-exec checkov --directory . --quiet --compact --soft-fail-on HIGH
        types_or: [yaml, dockerfile, terraform]
        pass_filenames: false
        stages: [manual, pre-push] # Skip in local pre-commit, run in CI or manually
        description: "Audit Infrastructure-as-Code (Terraform, K8s, Docker) for security best practices."

      - id: semgrep
        name: semgrep security scan
        language: system
        entry: unirtm hook-exec semgrep scan --config auto --error --quiet
        always_run: true
        pass_filenames: false
        description: "Multi-language static analysis for security, bugs, and best practices using Semgrep."

      - id: npm-pnpm-audit
        name: node ecosystem audit
        language: system
        entry: unirtm hook-exec node-audit
        files: '(pnpm-lock\.yaml|package-lock\.json|yarn\.lock|bun\.lockb)$'
        pass_filenames: false
        stages: [manual] # Temporarily disabled due to pnpm 10.30.3 audit API compatibility issue
        description: "Audit Node.js ecosystem dependencies for known vulnerabilities."

      # -- Hardening & Security ----------------------------------------------
      - id: check-executables-have-shebangs
        name: check shell scripts for shebangs
        entry: |
          python3 -c "
          import sys, os, stat
          if os.name == 'nt': sys.exit(0)
          missing = []
          for f in sys.argv[1:]:
              if os.path.isfile(f):
                  mode = os.stat(f).st_mode
                  # Check if any execution bit is set (Owner, Group, or Others)
                  if (mode & (stat.S_IXUSR | stat.S_IXGRP | stat.S_IXOTH)):
                      with open(f, 'rb') as fh:
                          head = fh.read(2)
                          if head != b'#!': missing.append(f)
          for f in missing: print(f'Executable lacks shebang: {f}')
          sys.exit(1 if missing else 0)
          "
        language: system
        types: [text]
        exclude: |
          (?x)^(
            .*\.bat|.*\.ps1|.*\.batch|.*\.cmd|.*\.exe|
            .*\.md|.*\.markdown|.*\.txt|.*\.pdf|.*\.docx?|
            .*\.css|.*\.scss|.*\.less|.*\.html|.*\.jsx?|.*\.tsx?|.*\.vue|.*\.astro|.*\.svelte|.*\.mjs|
            .*\.json[c5]?|.*\.ya?ml|.*\.toml|.*\.xml|.*\.ini|.*\.editorconfig|.*\.properties|.*\.env.*|
            .*\.png|.*\.jpg|.*\.jpeg|.*\.gif|.*\.ico|.*\.svg|.*\.lock|.*\.lockb|.*\.sum|.*\.resolved|
            \.gitignore|\.gitattributes|Makefile|ruff\.toml|eslint\.config\.mjs|commitlint\.config\.js|LICENSE
          )$
        description: "Executable scripts MUST start with a shebang (!#)."

      - id: check-shebang-scripts-are-executable
        name: check shebang scripts are executable
        entry: |
          python3 -c "
          import sys, os, stat
          if os.name == 'nt': sys.exit(0)
          not_exec = []
          for f in sys.argv[1:]:
              if os.path.isfile(f):
                  mode = os.stat(f).st_mode
                  # Check if any execution bit is set (Owner, Group, or Others)
                  if not (mode & (stat.S_IXUSR | stat.S_IXGRP | stat.S_IXOTH)):
                      with open(f, 'rb') as fh:
                          if fh.read(2) == b'#!': not_exec.append(f)
          for f in not_exec: print(f'Shebang script not executable: {f}')
          sys.exit(1 if not_exec else 0)
          "
        language: system
        types: [text]
        exclude: |
          (?x)^(
            .*\.bat|.*\.ps1|.*\.batch|.*\.cmd|.*\.exe|
            .*\.md|.*\.markdown|.*\.txt|.*\.pdf|.*\.docx?|
            .*\.css|.*\.scss|.*\.less|.*\.html|.*\.jsx?|.*\.tsx?|.*\.vue|.*\.astro|.*\.svelte|.*\.mjs|
            .*\.json[c5]?|.*\.ya?ml|.*\.toml|.*\.xml|.*\.ini|.*\.editorconfig|.*\.properties|.*\.env.*|
            .*\.png|.*\.jpg|.*\.jpeg|.*\.gif|.*\.ico|.*\.svg|.*\.lock|.*\.lockb|.*\.sum|.*\.resolved|
            \.gitignore|\.gitattributes|Makefile|ruff\.toml|eslint\.config\.mjs|commitlint\.config\.js|LICENSE
          )$
        description: "Scripts with shebangs MUST have the executable bit set."

      - id: forbidden-files
        name: check forbidden files
        entry: |
          python3 -c "
          import sys, os, re
          pattern = re.compile(r'(test\.txt|tmp\.json|debug\.log|\.DS_Store|Thumbs\.db|\.swp|\.bak|\\.orig|\\.rej|\\.coverage|\\.map|npm-debug\.log|\\.env)$')
          forbidden = [f for f in sys.argv[1:] if os.path.isfile(f) and pattern.search(f)]
          for f in forbidden: print(f'Forbidden file detected: {f}')
          sys.exit(1 if forbidden else 0)
          "
        language: system
        stages: [pre-commit, pre-merge-commit]
        description: "Prevent accidental commit of temporary or merge-remnant files."

      - id: check-lockfile-conflicts
        name: check lockfile conflicts
        entry: |
          python3 -c "
          import sys, os, re
          conflicts = []
          for f in sys.argv[1:]:
              if os.path.isfile(f):
                  with open(f, 'r', errors='ignore') as fh:
                      for line in fh:
                          if re.match(r'^(<<<<<<<|=======|>>>>>>>|\|\|\|\|\|\|\|)', line):
                              conflicts.append(f)
                              break
          for f in conflicts: print(f'Unresolved merge conflict in lockfile: {f}')
          sys.exit(1 if conflicts else 0)
          "
        language: system
        files: '(\-lock\.json|lock\.yaml|Cargo\.lock|go\.sum|composer\.lock|package-lock\.json|bun\.lockb|pubspec\.lock|Package\.resolved|flake\.lock|dvc\.lock)$'
        description: "Mandatory check for merge conflict markers in large lockfiles (no size limit)."

      - id: check-lockfile-coexistence
        name: check lockfile coexistence
        entry: |
          python3 -c "
          import sys, os
          dirs = set(os.path.dirname(f) or '.' for f in sys.argv[1:])
          conflicts = []
          for d in dirs:
              files = os.listdir(d)
              if 'package-lock.json' in files and 'pnpm-lock.yaml' in files:
                  conflicts.append(f'{d} (both package-lock.json and pnpm-lock.yaml found)')
              if 'package-lock.json' in files and 'yarn.lock' in files:
                  conflicts.append(f'{d} (both package-lock.json and yarn.lock found)')
              if 'package-lock.json' in files and 'bun.lockb' in files:
                  conflicts.append(f'{d} (both package-lock.json and bun.lockb found)')
              if 'pnpm-lock.yaml' in files and 'yarn.lock' in files:
                  conflicts.append(f'{d} (both pnpm-lock.yaml and yarn.lock found)')
              if 'pnpm-lock.yaml' in files and 'bun.lockb' in files:
                  conflicts.append(f'{d} (both pnpm-lock.yaml and bun.lockb found)')
              if 'yarn.lock' in files and 'bun.lockb' in files:
                  conflicts.append(f'{d} (both yarn.lock and bun.lockb found)')
          for c in conflicts: print(f'Conflicting lockfiles detected: {c}')
          sys.exit(1 if conflicts else 0)
          "
        language: system
        files: '(package-lock\.json|pnpm-lock\.yaml|yarn\.lock|bun\.lockb)$'
        description: "Prevent accidental coexistence of multiple Node.js package manager lockfiles."

      # -- Linting & Quality (Language Specific) ------------------------------
      - id: eslint
        name: eslint quality check
        language: system
        entry: unirtm hook-exec eslint --fix
        types_or:
          - javascript
          - ts
          - tsx
          - jsx
          - vue
        exclude: |
          (?x)^(\.github/agents|agent|agents|roo|claude|qwen|amazonq|augment|bob|codebuddy|codex|kilocode|opencode|qoder|shai|cursor|windsurf|pearai|pi|pochi|supermaven|tabnine|trae|vibe|void|zed|zencoder|openhands|cody|coderabbit|aide|cline|clinerules|cursorrules|pr_agent.toml)/.*
        description: "Find and fix problems in JavaScript/TypeScript/Vue code."

      - id: yamllint
        name: yamllint
        language: system
        entry: unirtm hook-exec yamllint --config-file .yamllint.yml
        types: [yaml]
        exclude: |
          (?x)^(\.github/agents|agent|agents|roo|claude|qwen|amazonq|augment|bob|codebuddy|codex|kilocode|opencode|qoder|shai|cursor|windsurf|pearai|pi|pochi|supermaven|tabnine|trae|vibe|void|zed|zencoder|openhands|cody|coderabbit|aide|cline|clinerules|cursorrules|pr_agent.toml)/.*
        description: "Lint YAML files based on strict project rules."

      - id: markdownlint-cli2
        name: markdownlint-cli2
        language: system
        entry: bash -c 'if unirtm which markdownlint-cli2 >/dev/null 2>&1; then printf "%s\\0" "$@" | xargs -0 -s 7000 unirtm exec -- markdownlint-cli2 --fix; else echo "Skipped markdownlint-cli2 not found"; fi' markdownlint-cli2
        types: [markdown]
        description: "Ensure Markdown follows project style guides."

      - id: shellcheck
        name: shellcheck
        language: system
        entry: unirtm hook-exec shellcheck
        types: [shell]
        exclude: |
          (?x)^(
            test_activate\.sh
          )
        description: "Posix-compliant ShellCheck for shell code quality."

      - id: shellcheck-posix
        name: shellcheck posix
        language: system
        entry: unirtm hook-exec shellcheck --shell=sh
        types: [shell]
        exclude: |
          (?x)^(
            tests/.*\.(sh|bats)$|
            test_activate\.sh
          )
        description: "Enforce strict POSIX compliance for shell scripts (Rule 01.3.39). Test files are excluded as they use bash features."

      - id: psscriptanalyzer
        name: PSScriptAnalyzer
        language: system
        entry: unirtm hook-exec psscriptanalyzer
        args:
          - -NoProfile
          - -Command
          - "& { if (!(Get-Command Invoke-ScriptAnalyzer -ErrorAction SilentlyContinue)) { exit 0 }; $r = $args | ForEach-Object { Invoke-ScriptAnalyzer -Path $_ -Settings PSScriptAnalyzerSettings.psd1 -Severity Error,Warning }; if ($r) { $r | Format-Table -AutoSize; exit 1 } }"
        types: [powershell]
        description: "PowerShell static analysis tool (macOS/Windows)."

      - id: actionlint
        name: check github actions
        language: system
        entry: unirtm hook-exec actionlint --shellcheck=
        files: ^\.github/workflows/.*\.yml$
        description: "Validate GitHub Actions workflow syntax."

      - id: zizmor
        name: zizmor security check
        language: system
        entry: unirtm hook-exec zizmor --config .zizmor.yml
        files: ^\.github/workflows/.*\.yml$
        description: "Audit GitHub Actions workflows for security best practices."

      # -- Infrastructure & Config -------------------------------------------
      - id: dockerfile-utils
        name: dockerfile quality check
        language: system
        entry: unirtm hook-exec dockerfile-utils lint
        files: Dockerfile
        description: "Validate Dockerfile syntax and best practices."

      - id: editorconfig-checker
        name: editorconfig quality check
        language: system
        entry: unirtm hook-exec editorconfig-checker
        exclude: |
          (?x)^(
            \.(venv|git|github/agents|agent|agents|roo|claude|qwen|amazonq|augment|bob|codebuddy|codex|kilocode|opencode|qoder|shai|cursor|windsurf|pearai|pi|pochi|specify|supermaven|tabnine|trae|vibe|void|zed|zencoder|openhands|cody|coderabbit|aide|cline|clinerules|cursorrules|pr_agent.toml|idx|continue|history|vscode-test)/.*|
            node_modules/|venv/|env/|dist/|build/|out/|target/|vendor/|__pycache__/|\.specify/|
            \.aider\.conf\.yml
          )
        description: "Ensure compliance with .editorconfig rules across the project."

      - id: goreleaser-check
        name: goreleaser check
        language: system
        entry: unirtm hook-exec goreleaser check
        files: ^\.goreleaser\.ya?ml$
        pass_filenames: false
        description: "Check GoReleaser configuration."

      - id: commitlint
        name: check commit message format
        language: system
        entry: unirtm hook-exec commitlint --edit
        always_run: true
        stages: [commit-msg]
        description: "Enforce Conventional Commits specification for commit messages."
