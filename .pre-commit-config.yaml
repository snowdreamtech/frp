      # -- Hardening & Security ----------------------------------------------
      - id: check-executables-have-shebangs
        name: check shell scripts for shebangs
        entry: |
          python3 -c "
          import sys, os, stat
          if os.name == 'nt': sys.exit(0)
          missing = []
          for f in sys.argv[1:]:
              if os.path.isfile(f):
                  mode = os.stat(f).st_mode
                  # Check if any execution bit is set (Owner, Group, or Others)
                  if (mode & (stat.S_IXUSR | stat.S_IXGRP | stat.S_IXOTH)):
                      with open(f, 'rb') as fh:
                          head = fh.read(2)
                          if head != b'#!': missing.append(f)
          for f in missing: print(f'Executable lacks shebang: {f}')
          sys.exit(1 if missing else 0)
          "
        language: system
        types: [text]
        exclude: |
          (?x)^(
            .*\.bat|.*\.ps1|.*\.batch|.*\.cmd|.*\.exe|
            .*\.md|.*\.markdown|.*\.txt|.*\.pdf|.*\.docx?|
            .*\.css|.*\.scss|.*\.less|.*\.html|.*\.jsx?|.*\.tsx?|.*\.vue|.*\.astro|.*\.svelte|.*\.mjs|
            .*\.json[c5]?|.*\.ya?ml|.*\.toml|.*\.xml|.*\.ini|.*\.editorconfig|.*\.properties|.*\.env.*|
            .*\.png|.*\.jpg|.*\.jpeg|.*\.gif|.*\.ico|.*\.svg|.*\.lock|.*\.lockb|.*\.sum|.*\.resolved|
            \.gitignore|\.gitattributes|Makefile|ruff\.toml|eslint\.config\.mjs|commitlint\.config\.js|LICENSE
          )$
        description: "Executable scripts MUST start with a shebang (!#)."

      - id: check-shebang-scripts-are-executable
        name: check shebang scripts are executable
        entry: |
          python3 -c "
          import sys, os, stat
          if os.name == 'nt': sys.exit(0)
          not_exec = []
          for f in sys.argv[1:]:
              if os.path.isfile(f):
                  mode = os.stat(f).st_mode
                  # Check if any execution bit is set (Owner, Group, or Others)
                  if not (mode & (stat.S_IXUSR | stat.S_IXGRP | stat.S_IXOTH)):
                      with open(f, 'rb') as fh:
                          if fh.read(2) == b'#!': not_exec.append(f)
          for f in not_exec: print(f'Shebang script not executable: {f}')
          sys.exit(1 if not_exec else 0)
          "
        language: system
        types: [text]
        exclude: |
          (?x)^(
            .*\.bat|.*\.ps1|.*\.batch|.*\.cmd|.*\.exe|
            .*\.md|.*\.markdown|.*\.txt|.*\.pdf|.*\.docx?|
            .*\.css|.*\.scss|.*\.less|.*\.html|.*\.jsx?|.*\.tsx?|.*\.vue|.*\.astro|.*\.svelte|.*\.mjs|
            .*\.json[c5]?|.*\.ya?ml|.*\.toml|.*\.xml|.*\.ini|.*\.editorconfig|.*\.properties|.*\.env.*|
            .*\.png|.*\.jpg|.*\.jpeg|.*\.gif|.*\.ico|.*\.svg|.*\.lock|.*\.lockb|.*\.sum|.*\.resolved|
            \.gitignore|\.gitattributes|Makefile|ruff\.toml|eslint\.config\.mjs|commitlint\.config\.js|LICENSE
          )$
        description: "Scripts with shebangs MUST have the executable bit set."

