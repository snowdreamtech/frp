---
# .pre-commit-config.yaml - Second Line of Defense
#
# -- Triple Guarantee ----------------------------------------------
# This configuration implements the "Incremental Shift-Left" philosophy.
# It ensures that all staged changes meet the project's quality standards BEFORE
# they are committed to the repository.
#
# Layers of Defense:
#   1. Agent/Dev Auto-fix: Immediate local correction (eslint --fix, etc.).
#   2. Git Commit Intercept (THIS FILE): Incremental scan of staged files.
#   3. CI/CD Strict Checks: Authoritative full-repository audit.
#
# Setup (Local Machine):
#   sh scripts/setup.sh hooks
#
# Manual Run:
#   pre-commit run --all-files
#
# ------------------------------------------------------------------------------

fail_fast: false
default_stages: [pre-commit, pre-merge-commit]
exclude: |
  (?x)^(
    \.git/|
    node_modules/|
    \.venv/|venv/|env/|
    vendor/|
    dist/|build/|out/|target/|
    \.next/|\.nuxt/|\.output/|
    __pycache__/|
    \.specify/|
    \.tmp/|tmp/|
    \.(venv|idx|continue|history|vscode-test)/.*|
    \.aider\.conf\.yml
  )

repos:
  - repo: local
    hooks:
      # -- Git Hygiene (Incremental) ------------------------------------------
      - id: trailing-whitespace
        name: trim trailing whitespace
        entry: |
          python3 -c "
          import sys, re, os
          modified = []
          for f in sys.argv[1:]:
              if os.path.isfile(f) and os.path.getsize(f) < 2*1024*1024:
                  with open(f, 'rb') as fh: content = fh.read()
                  new_content = re.sub(b'[ \t]+(?=\r?\n|$)', b'', content)
                  if content != new_content:
                      with open(f, 'wb') as fh: fh.write(new_content)
                      modified.append(f)
          for f in modified: print(f'Fixing trailing whitespace in: {f}')
          sys.exit(1 if modified else 0)
          "
        language: system
        types: [text]
        exclude: |
          (?x)^(
            \.md$|.*\.lock$|go\.sum$|
            (\.github/agents|agent|agents|roo|claude|qwen|amazonq|augment|bob|codebuddy|codex|kilocode|opencode|qoder|shai|cursor|windsurf|pearai|pi|pochi|supermaven|tabnine|trae|vibe|void|zed|zencoder|openhands|cody|coderabbit|aide|cline|clinerules|cursorrules|pr_agent.toml)/.*
          )
        stages: [pre-commit, pre-merge-commit]
        description: "Standardize text hygiene by removing trailing whitespace."

      - id: end-of-file-fixer
        name: fix end of files
        entry: |
          python3 -c "
          import sys, os
          modified = []
          for f in sys.argv[1:]:
              if os.path.isfile(f) and os.path.getsize(f) < 2*1024*1024:
                  with open(f, 'rb') as fh: content = fh.read()
                  if not content: continue
                  stripped = content.rstrip(b'\r\n')
                  newline = b'\r\n' if b'\r\n' in content else b'\n'
                  new_content = stripped + newline
                  if content != new_content:
                      with open(f, 'wb') as fh: fh.write(new_content)
                      modified.append(f)
          for f in modified: print(f'Fixing end of file in: {f}')
          sys.exit(1 if modified else 0)
          "
        language: system
        types: [text]
        exclude: |
          (?x)^(
            .*\.lock$|go\.sum$|
            (\.github/agents|agent|agents|roo|claude|qwen|amazonq|augment|bob|codebuddy|codex|kilocode|opencode|qoder|shai|cursor|windsurf|pearai|pi|pochi|supermaven|tabnine|trae|vibe|void|zed|zencoder|openhands|cody|coderabbit|aide|cline|clinerules|cursorrules|pr_agent.toml)/.*
          )
        stages: [pre-commit, pre-merge-commit]
        description: "Ensure that files end with a single newline character."

      - id: check-added-large-files
        name: check for added large files
        entry: |
          python3 -c "
          import sys, os
          large_files = [f for f in sys.argv[1:] if os.path.isfile(f) and os.path.getsize(f) > 1024*1024]
          for f in large_files: print(f'File too large (>1MB): {f}')
          sys.exit(1 if large_files else 0)
          "
        language: system
        exclude: |
          (?x)^(
            examples/plugin-go/unirtm-plugin-example|
            docs/tapes/demo\.gif
          )
        stages: [pre-commit, pre-merge-commit]
        description: "Prevent large files (>1MB) from being committed."

      - id: check-merge-conflict
        name: check for merge conflicts
        entry: |
          python3 -c "
          import sys, os, re
          conflicts = []
          for f in sys.argv[1:]:
              if os.path.isfile(f) and os.path.getsize(f) < 2*1024*1024:
                  with open(f, 'r', errors='ignore') as fh:
                      for line in fh:
                          if re.match(r'^(<<<<<<<|=======|>>>>>>>|\|\|\|\|\|\|\|)', line):
                              conflicts.append(f)
                              break
          for f in conflicts: print(f'Merge conflict markers found in: {f}')
          sys.exit(1 if conflicts else 0)
          "
        language: system
        types: [text]
        stages: [pre-commit, pre-merge-commit]
        description: "Intercept files containing git merge conflict markers."

      - id: check-case-conflict
        name: check for case conflicts
        entry: |
          python3 -c "
          import sys, os
          dirs = set(os.path.dirname(f) or '.' for f in sys.argv[1:])
          clashing = []
          for d in dirs:
              files = os.listdir(d)
              freq = {}
              for f in files:
                  low = f.lower()
                  freq[low] = freq.get(low, 0) + 1
              for f in files:
                  if freq[f.lower()] > 1: clashing.append(os.path.join(d, f))
          for f in sorted(set(clashing)): print(f'Case collision: {f}')
          sys.exit(1 if clashing else 0)
          "
        language: system
        stages: [pre-commit, pre-merge-commit]
        description: "Verify that filenames are unique across case-insensitive filesystems."

      - id: check-symlinks
        name: check for broken symlinks
        entry: |
          python3 -c "
          import sys, os
          broken = [f for f in sys.argv[1:] if os.path.islink(f) and not os.path.exists(f)]
          for f in broken: print(f'Broken symlink: {f}')
          sys.exit(1 if broken else 0)
          "
        language: system
        stages: [pre-commit, pre-merge-commit]
        description: "Ensure symlinks point to existing locations."

      - id: check-utf8-bom
        name: check for utf8 bom
        entry: |
          python3 -c "
          import sys, os
          found = []
          for f in sys.argv[1:]:
              if os.path.isfile(f) and os.path.getsize(f) > 3:
                  with open(f, 'rb') as fh:
                      if fh.read(3) == b'\xef\xbb\xbf': found.append(f)
          for f in found: print(f'Illegal UTF-8 BOM detected: {f}')
          sys.exit(1 if found else 0)
          "
        language: system
        types: [text]
        exclude: scripts/sync-labels\.ps1$
        description: "Prevent illegal Byte Order Mark (BOM) in UTF-8 files."

      # -- Data & Configuration Hygiene ---------------------------------------
      - id: check-xml
        name: check xml well-formedness
        entry: |
          python3 -c "
          import sys, os, xml.etree.ElementTree as ET
          errors = []
          for f in sys.argv[1:]:
              if os.path.isfile(f) and os.path.getsize(f) < 5*1024*1024:
                  try: ET.parse(f)
                  except Exception as e: errors.append(f'{f} ({e})')
          for e in errors: print(f'Malformed XML: {e}')
          sys.exit(1 if errors else 0)
          "
        language: system
        types: [xml]
        description: "Verify that XML files are well-formed."

      - id: check-json
        name: check json well-formedness
        entry: |
          python3 -c "
          import sys, os, json
          errors = []
          for f in sys.argv[1:]:
              if os.path.isfile(f) and os.path.getsize(f) < 2*1024*1024:
                  try:
                      with open(f, 'r', encoding='utf-8') as fh: json.load(fh)
                  except Exception as e: errors.append(f'{f} ({e})')
          for e in errors: print(f'Malformed JSON: {e}')
          sys.exit(1 if errors else 0)
          "
        language: system
        types: [json]
        exclude: '\.vscode/.*\.json$'
        description: "Verify that JSON files are well-formed."

      - id: check-toml
        name: check toml well-formedness
        entry: |
          python3 -c "
          import sys, os
          try:
              import tomllib as toml
          except ImportError:
              try: import tomli as toml
              except ImportError: sys.exit(0)
          errors = []
          for f in sys.argv[1:]:
              if os.path.isfile(f) and os.path.getsize(f) < 2*1024*1024:
                  try:
                      with open(f, 'rb') as fh: toml.load(fh)
                  except Exception as e: errors.append(f'{f} ({e})')
          for e in errors: print(f'Malformed TOML: {e}')
          sys.exit(1 if errors else 0)
          "
        language: system
        files: '\.toml$'
        description: "Verify that TOML files are well-formed (requires Python 3.11+ or tomllib)."

      - id: check-ini
        name: check ini well-formedness
        entry: |
          python3 -c "
          import sys, os, configparser
          errors = []
          for f in sys.argv[1:]:
              if os.path.isfile(f) and os.path.getsize(f) < 1024*1024:
                  try:
                      cp = configparser.ConfigParser()
                      cp.read(f, encoding='utf-8')
                  except Exception as e: errors.append(f'{f} ({e})')
          for e in errors: print(f'Malformed INI: {e}')
          sys.exit(1 if errors else 0)
          "
        language: system
        files: '\.(ini|editorconfig|properties)$'
        exclude: '\.(editorconfig|\.vscode/.*\.json)$'
        description: "Verify that INI and property files are well-formed."

      - id: check-plist
        name: check plist well-formedness
        entry: |
          python3 -c "
          import sys, os, plistlib
          errors = []
          for f in sys.argv[1:]:
              if os.path.isfile(f) and os.path.getsize(f) < 2*1024*1024:
                  try:
                      with open(f, 'rb') as fh: plistlib.load(fh)
                  except Exception as e: errors.append(f'{f} ({e})')
          for e in errors: print(f'Malformed Plist: {e}')
          sys.exit(1 if errors else 0)
          "
        language: system
        files: '\.plist$'
        description: "Verify that Apple Plist files (XML or Binary) are well-formed."

      - id: check-csv
        name: check csv consistency
        entry: |
          python3 -c "
          import sys, os, csv
          errors = []
          for f in sys.argv[1:]:
              if os.path.isfile(f) and os.path.getsize(f) < 5*1024*1024:
                  try:
                      with open(f, 'r', encoding='utf-8', newline='') as fh:
                          reader = csv.reader(fh)
                          header = next(reader, None)
                          if header:
                              cols = len(header)
                              for i, row in enumerate(reader, 2):
                                  if len(row) != cols:
                                      errors.append(f'{f}:{i} (expected {cols} columns, got {len(row)})')
                                      break
                  except Exception as e: errors.append(f'{f} ({e})')
          for e in errors: print(f'CSV/TSV inconsistency: {e}')
          sys.exit(1 if errors else 0)
          "
        language: system
        files: '\.(csv|tsv)$'
        description: "Verify that CSV/TSV files have consistent column counts across all rows."

      - id: check-jsonc
        name: check jsonc well-formedness
        entry: |
          python3 -c "
          import sys, os, json, re
          errors = []
          for f in sys.argv[1:]:
              if os.path.isfile(f) and os.path.getsize(f) < 2*1024*1024:
                  try:
                      with open(f, 'r', encoding='utf-8') as fh:
                          content = fh.read()
                          content = re.sub(r'(?<![:])//.*', '', content)
                          content = re.sub(r'/\*.*?\*/', '', content, flags=re.S)
                          content = re.sub(r',([ \t\r\n]*[}\]])', r'\1', content)
                          json.loads(content)
                  except Exception as e: errors.append(f'{f} ({e})')
          for e in errors: print(f'Malformed JSONC: {e}')
          sys.exit(1 if errors else 0)
          "
        language: system
        files: '\.(jsonc|json5)$|tsconfig.*\.json$|devcontainer\.json$|\.vscode/.*\.json$'
        description: "Verify that JSON with Comments (JSONC/JSON5) files are well-formed."

      - id: check-svg-safety
        name: check svg safety
        entry: |
          python3 -c "
          import sys, os, re
          errors = []
          for f in sys.argv[1:]:
              if os.path.isfile(f) and os.path.getsize(f) < 5*1024*1024:
                  try:
                      with open(f, 'rb') as fh:
                          content = fh.read().lower()
                          if b'<script' in content or re.search(b' on\w+=', content):
                              errors.append(f'{f} (contains potential script injection)')
                  except Exception as e: errors.append(f'{f} ({e})')
          for e in errors: print(f'Unsafe SVG detected: {e}')
          sys.exit(1 if errors else 0)
          "
        language: system
        files: '\.svg$'
        description: "Verify that SVG files are well-formed and free of malicious script injections."

      - id: check-rego
        name: check rego policy
        language: system
        entry: unirtm hook-exec opa parse
        files: '\.rego$'
        description: "Verify that Rego policy files are well-formed (uses 'opa parse')."

      - id: buf-lint
        name: buf lint
        language: system
        entry: unirtm hook-exec buf lint
        files: \.proto$
        exclude: |
          (?x)^(\.github/agents|agent|agents|roo|claude|qwen|amazonq|augment|bob|codebuddy|codex|kilocode|opencode|qoder|shai|cursor|windsurf|pearai|pi|pochi|supermaven|tabnine|trae|vibe|void|zed|zencoder|openhands|cody|coderabbit|aide|cline|clinerules|cursorrules|pr_agent.toml)/.*
        description: "Lint Protobuf files using Buf."

      - id: buf-format
        name: buf format
        language: system
        entry: unirtm hook-exec buf format -d --exit-code
        files: \.proto$
        exclude: |
          (?x)^(\.github/agents|agent|agents|roo|claude|qwen|amazonq|augment|bob|codebuddy|codex|kilocode|opencode|qoder|shai|cursor|windsurf|pearai|pi|pochi|supermaven|tabnine|trae|vibe|void|zed|zencoder|openhands|cody|coderabbit|aide|cline|clinerules|cursorrules|pr_agent.toml)/.*
        description: "Verify Protobuf file formatting using Buf."

      - id: check-jinja2
        name: check jinja2 syntax
        entry: |
          python3 -c "
          import sys, os
          try:
              from jinja2 import Environment
              env = Environment()
          except ImportError: env = None
          errors = []
          for f in sys.argv[1:]:
              if os.path.isfile(f) and os.path.getsize(f) < 1024*1024:
                  with open(f, 'r', encoding='utf-8') as fh:
                      content = fh.read()
                      if env:
                          try: env.parse(content)
                          except Exception as e: errors.append(f'{f} ({e})')
                      else:
                          if content.count('{{') != content.count('}}') or content.count('{%') != content.count('%}'):
                              errors.append(f'{f} (unbalanced delimiters)')
          for e in errors: print(f'Malformed Jinja2: {e}')
          sys.exit(1 if errors else 0)
          "
        language: system
        files: '\.(j2|jinja2|gotmpl|tmpl)$'
        description: "Verify that Jinja2/Template files have valid syntax (uses 'jinja2' if available)."

      - id: check-nix
        name: check nix well-formedness
        entry: |
          python3 -c "
          import sys, os
          errors = []
          for f in sys.argv[1:]:
              if os.path.isfile(f) and os.path.getsize(f) < 1024*1024:
                  with open(f, 'r', encoding='utf-8') as fh:
                      content = fh.read()
                      if content.count('{') != content.count('}') or content.count('[') != content.count(']'):
                          errors.append(f'{f} (unbalanced braces/brackets)')
                      if '=' in content and ';' not in content and '{' not in content:
                          errors.append(f'{f} (potential missing semicolon)')
          for e in errors: print(f'Malformed Nix: {e}')
          sys.exit(1 if errors else 0)
          "
        language: system
        files: '\.nix$'
        description: "Verify that Nix files are well-formed (basic structural check)."

      - id: zig-fmt
        name: check zig style
        language: system
        entry: unirtm hook-exec zig fmt --check
        files: '\.zig$'
        exclude: |
          (?x)^(\.github/agents|agent|agents|roo|claude|qwen|amazonq|augment|bob|codebuddy|codex|kilocode|opencode|qoder|shai|cursor|windsurf|pearai|pi|pochi|supermaven|tabnine|trae|vibe|void|zed|zencoder|openhands|cody|coderabbit|aide|cline|clinerules|cursorrules|pr_agent.toml)/.*
        description: "Verify Zig code formatting using 'zig fmt'."

      - id: check-justfile
        name: check justfile well-formedness
        language: system
        entry: unirtm hook-exec just --check --justfile
        files: "justfile$"
        description: "Verify that justfile (Task runner) files are well-formed."

      - id: cue-fmt
        name: check cue style
        language: system
        entry: unirtm hook-exec cue fmt
        files: '\.cue$'
        exclude: |
          (?x)^(\.github/agents|agent|agents|roo|claude|qwen|amazonq|augment|bob|codebuddy|codex|kilocode|opencode|qoder|shai|cursor|windsurf|pearai|pi|pochi|supermaven|tabnine|trae|vibe|void|zed|zencoder|openhands|cody|coderabbit|aide|cline|clinerules|cursorrules|pr_agent.toml)/.*
        description: "Verify CUE configuration formatting."

      - id: jsonnet-fmt
        name: check jsonnet style
        language: system
        entry: unirtm hook-exec jsonnetfmt -i
        files: '\.jsonnet$'
        exclude: |
          (?x)^(\.github/agents|agent|agents|roo|claude|qwen|amazonq|augment|bob|codebuddy|codex|kilocode|opencode|qoder|shai|cursor|windsurf|pearai|pi|pochi|supermaven|tabnine|trae|vibe|void|zed|zencoder|openhands|cody|coderabbit|aide|cline|clinerules|cursorrules|pr_agent.toml)/.*
        description: "Verify Jsonnet configuration formatting."

      - id: check-webserver-config
        name: check web server config
        entry: |
          python3 -c "
          import sys, os
          errors = []
          for f in sys.argv[1:]:
              if os.path.isfile(f) and os.path.getsize(f) < 1024*1024:
                  with open(f, 'r', encoding='utf-8') as fh:
                      content = fh.read()
                      if content.count('{') != content.count('}'):
                          errors.append(f'{f} (unbalanced braces)')
          for e in errors: print(f'Malformed Config: {e}')
          sys.exit(1 if errors else 0)
          "
        language: system
        files: '(Caddyfile$|\.conf$)'
        description: "Verify that Caddyfile and Nginx/Web server configurations are well-formed."

      - id: check-brewfile
        name: check brewfile
        entry: |
          python3 -c "
          import sys, os
          errors = []
          allowed = {'tap', 'brew', 'cask', 'mas', 'vscode', 'whalebrew'}
          for f in sys.argv[1:]:
              if os.path.isfile(f) and os.path.getsize(f) < 1024*1024:
                  with open(f, 'r', encoding='utf-8') as fh:
                      for i, line in enumerate(fh, 1):
                          line = line.strip()
                          if not line or line.startswith('#'): continue
                          cmd = line.split()[0] if line.split() else ''
                          if cmd not in allowed:
                              errors.append(f'{f}:{i} (unknown command: {cmd})')
          for e in errors: print(f'Malformed Brewfile: {e}')
          sys.exit(1 if errors else 0)
          "
        language: system
        files: "Brewfile$"
        description: "Verify that Brewfile (Homebrew Bundle) files follow the correct DSL."

      - id: check-prisma
        name: check prisma schema
        entry: |
          python3 -c "
          import sys, os
          errors = []
          for f in sys.argv[1:]:
              if os.path.isfile(f) and os.path.getsize(f) < 1024*1024:
                  with open(f, 'r', encoding='utf-8') as fh:
                      content = fh.read()
                      if content.count('{') != content.count('}'):
                          errors.append(f'{f} (unbalanced braces)')
                      if 'datasource' in content and 'provider' not in content:
                          errors.append(f'{f} (datasource missing provider)')
          for e in errors: print(f'Malformed Prisma: {e}')
          sys.exit(1 if errors else 0)
          "
        language: system
        files: '\.prisma$'
        description: "Verify that Prisma schema files are well-formed (basic structural check)."

      - id: check-jupyter
        name: check jupyter notebooks
        entry: |
          python3 -c "
          import sys, os, json
          errors = []
          for f in sys.argv[1:]:
              if os.path.isfile(f) and os.path.getsize(f) < 10*1024*1024:
                  try:
                      with open(f, 'r', encoding='utf-8') as fh:
                          nb = json.load(fh)
                          if 'cells' not in nb: errors.append(f'{f} (missing cells)')
                          for i, cell in enumerate(nb.get('cells', [])):
                              if len(str(cell.get('outputs', []))) > 100000:
                                  errors.append(f'{f}:cell {i} (output too large, please strip)')
                  except Exception as e: errors.append(f'{f} ({e})')
          for e in errors: print(f'Malformed/Heavy Jupyter Notebook: {e}')
          sys.exit(1 if errors else 0)
          "
        language: system
        files: '\.ipynb$'
        description: "Verify that Jupyter Notebooks are well-formed and don't contain excessive output data."

      - id: check-pulumi
        name: check pulumi config
        entry: |
          python3 -c "
          import sys, os, yaml
          errors = []
          for f in sys.argv[1:]:
              if os.path.isfile(f):
                  try:
                      with open(f, 'r') as fh:
                          cfg = yaml.safe_load(fh)
                          if 'name' not in cfg or 'runtime' not in cfg:
                              errors.append(f'{f} (missing name or runtime)')
                  except Exception as e: errors.append(f'{f} ({e})')
          for e in errors: print(f'Malformed Pulumi Config: {e}')
          sys.exit(1 if errors else 0)
          "
        language: system
        files: 'Pulumi\.yaml$'
        description: "Verify that Pulumi configuration files are well-formed."

      - id: check-crossplane
        name: check crossplane manifests
        entry: |
          python3 -c "
          import sys, os, yaml
          errors = []
          for f in sys.argv[1:]:
              if os.path.isfile(f):
                  try:
                      with open(f, 'r') as fh:
                          for doc in yaml.safe_load_all(fh):
                              if doc and 'apiVersion' in doc and 'crossplane.io' in doc['apiVersion']:
                                  if 'kind' not in doc: errors.append(f'{f} (metadata incomplete)')
                  except Exception as e: errors.append(f'{f} ({e})')
          for e in errors: print(f'Malformed Crossplane Manifest: {e}')
          sys.exit(1 if errors else 0)
          "
        language: system
        files: '.*crossplane.*\.ya?ml$'
        description: "Verify that Crossplane manifests follow basic Kubernetes/Crossplane structure."

      - id: check-env-safety
        name: check environment safety
        entry: |
          python3 -c "
          import sys, os, re
          errors = []
          # Simple regex for high-entropy strings or common secret patterns
          SECRET_REGEX = re.compile(r'=[a-zA-Z0-9/\+]{20,}')
          for f in sys.argv[1:]:
              if os.path.isfile(f):
                  with open(f, 'r', encoding='utf-8', errors='ignore') as fh:
                      for i, line in enumerate(fh, 1):
                          if '=' in line and not line.strip().startswith('#'):
                              val = line.split('=', 1)[1].strip()
                              if val and (SECRET_REGEX.search(line) or any(k in val.lower() for k in ['pk_', 'sk_', 'key_', 'token_', 'secret_', 'passwd_', 'api_key', 'access_token', 'refresh_token'])):
                                  if 'your_' not in val.lower() and '<' not in val:
                                      errors.append(f'{f}:{i} (potential real secret detected)')
          for e in errors: print(f'Unsafe Env File: {e}')
          sys.exit(1 if errors else 0)
          "
        language: system
        files: '\.env(\..+)?$'
        description: "Verify that .env files and templates do not contain real secrets or high-entropy values."

