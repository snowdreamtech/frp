# ------------------------------------------------------------
# mise.toml — Two-tier Tool Management
# ------------------------------------------------------------
# TIER 1 (Core): Tools required for all projects — always installed.
# TIER 2 (On-demand): Language/domain-specific — installed by
#   scripts/lib/langs/*.sh when source files are detected.
# ------------------------------------------------------------

[tools]

# ── 🏗️ Core Runtimes ──────────────────────────────────────────────────────────
go = "1.26.2"
node = "25.9.0"
"npm:pnpm" = "11.0.4"
python = "3.14.4"
# pipx is managed as a bootstrap tool via pip in scripts/lib/langs/base.sh to ensure cross-platform compatibility.
# pipx = "1.11.0"


# ── 🔐 Security & Engineering (always needed) ──────────────────────────────────
"github:gitleaks/gitleaks" = "8.30.1"
"github:google/osv-scanner" = "2.3.5"
"github:zizmorcore/zizmor" = "1.24.1"
"github:cli/cli" = "2.92.0"

# ── 💎 Core Quality & Commit Tooling ──────────────────────────────────────────
# Tools invoked by pre-commit hooks or universally needed.
"github:checkmake/checkmake" = "v0.3.2"
"github:editorconfig-checker/editorconfig-checker" = { version = "3.6.1", bin = "ec-*" }
"github:google/addlicense" = "1.2.0"

# Git / commit workflow
"npm:@commitlint/cli" = "20.5.3"
"npm:@commitlint/config-conventional" = "20.5.3"
"npm:commitizen" = "4.3.1"
"npm:cz-conventional-changelog" = "3.3.0"

# Formatting & linting (invoked by pre-commit hooks)
"npm:prettier" = "3.8.3"
"npm:eslint" = "10.3.0"
"npm:stylelint" = "17.10.0"
"npm:markdownlint-cli2" = "0.22.1"
"npm:sort-package-json" = "3.6.1"
"npm:@taplo/cli" = "0.7.0"
"npm:dockerfile-utils" = "0.16.3"

# Common linters (pre-commit hooks)
"github:hadolint/hadolint" = "2.14.0"
"github:dotenv-linter/dotenv-linter" = "4.0.0"
"pipx:yamllint" = "1.38.0"

# Python tools (pre-commit hooks)
"github:astral-sh/ruff" = "0.15.12"
"pipx:clang-format" = "22.1.4"

# Shell & scripting linters (pre-commit hooks)
"github:rhysd/actionlint" = "1.7.12"
"pipx:pre-commit" = "4.6.0"
"github:koalaman/shellcheck" = "0.11.0"
"github:mvdan/sh" = { version = "3.13.1", bin = "shfmt" }

# Testing (required by make test)
"npm:bats" = "1.13.0"

# ── DevOps/release tools used globally ──────────────────────────────────────────


# ------------------------------------------------------------
# Global settings
# ------------------------------------------------------------
[settings]
experimental = true

# ASDF Compatibility: File Format Only
# Allows mise to read .tool-versions files (asdf format)
# NOTE: This is UNRELATED to Aqua Registry - it's just file format compatibility
asdf_compat = true

# 🛡️ Supply Chain Security: Disable Aqua Registry Backend
# CRITICAL: Force mise to download binaries ONLY from GitHub Releases,
# not from Aqua Registry which may repackage binaries and lose provenance.
# See: docs/troubleshooting/mise-attestation-error.md
# See: docs/reference/mise-configuration.md
aqua.baked_registry = false
aqua.github_attestations = false
aqua.slsa = false
aqua.cosign = false
aqua.minisign = false
# Settings and URL replacements for network reliability.
# Note: url_replacements do not support Jinja2/Tera templates directly in settings;
# simple key-value replacement of the URL prefix is performed.
http_timeout = "300s" # 5 minutes for slow GitHub downloads
# GitHub proxy disabled - causing mise ls to hang
# url_replacements = { "https://github.com" = "https://gh-proxy.sn0wdr1am.com/https://github.com" }

# GitHub Artifact Attestations Verification
# IMPORTANT: mise uses Aqua Registry as backend for github: tools, which requires
# attestation verification. If you encounter errors like:
#   "github:astral-sh/ruff@X.Y.Z has no provenance verification on <platform>"
# This is likely a mise bug or the upstream project temporarily missing attestations.
# See: docs/troubleshooting/mise-attestation-error.md
#
# Workarounds:
# 1. Temporary: Set MISE_SKIP_CHECKSUM=1 (not recommended for production)
# 2. Pin to last known good version with attestations
# 3. Wait for upstream to add attestations or mise to fix the issue
# 4. Disable attestation checks (already done via aqua.github_attestations = false)

# Node.js flavor configuration for Alpine/musl environments
# CRITICAL: This must be set in [settings] section, not just as env var
# When node.flavor is set, mise will download precompiled binaries instead of source
[settings.node]
# Conditional flavor setting based on Alpine detection
# Note: Tera templates don't work in settings section, so we set a default
# and rely on MISE_NODE_FLAVOR env var for runtime override
# flavor = "musl"  # Uncomment this line when running in Alpine/musl environment


# ------------------------------------------------------------
# Environment variables for performance acceleration
# ------------------------------------------------------------
[env]
# 🛡️ Layer 2: Environment Variable Enforcement
# Force disable Aqua Registry even if settings are overridden
MISE_DISABLE_AQUA = "1"
# GitHub Proxy Acceleration - Enable locally for faster downloads, disable in CI
ENABLE_GITHUB_PROXY = "{% if env.CI is defined %}0{% else %}1{% endif %}"
GITHUB_PROXY = "https://gh-proxy.sn0wdr1am.com/"

# Feature Governance (0 = Disabled, 1 = Enabled)
CONFIG_AUTO_UPDATE = "1"

PYTHONUTF8 = "1"
# Corepack: bypass signature verification (fixes Windows Node 20 key mismatch)
COREPACK_INTEGRITY_KEYS = "0"

# Node.js & npm acceleration
NPM_CONFIG_REGISTRY = "{% if env.CI is defined %}https://registry.npmjs.org{% else %}https://registry.npmmirror.com{% endif %}"
NODEJS_ORG_MIRROR = "{% if env.CI is defined %}https://nodejs.org/dist/{% else %}https://npmmirror.com/mirrors/node/{% endif %}"

# Node.js mirror configuration for Alpine/musl environments
# CRITICAL: unofficial-builds.nodejs.org has different structure and limitations:
# 1. Directory structure: /download/release/ (not /dist/)
# 2. Only provides precompiled musl binaries (node-vX.Y.Z-linux-ARCH-musl.tar.gz)
# 3. Does NOT provide source tarballs (node-vX.Y.Z.tar.gz)
# 4. Binary naming includes "-musl" suffix
# 5. IMPORTANT: npm requires bash, which is not installed by default in Alpine
#    You must install bash first: apk add bash
#
# For Alpine/musl: Use unofficial-builds with flavor=musl and compile=false
# For others: Use official mirror (CI) or npmmirror (local)
MISE_NODE_MIRROR_URL = "{% if env.ALPINE_VERSION is defined %}https://unofficial-builds.nodejs.org/download/release/{% elif env.CI is defined %}https://nodejs.org/dist/{% else %}https://npmmirror.com/mirrors/node/{% endif %}"
MISE_NODE_FLAVOR = "{% if env.ALPINE_VERSION is defined %}musl{% endif %}"
# Disable source compilation for musl (node.compile is boolean: true/false)
MISE_NODE_COMPILE = "{% if env.ALPINE_VERSION is defined %}false{% endif %}"

# Python & pip acceleration
PIP_INDEX_URL = "{% if env.CI is defined %}https://pypi.org/simple{% else %}https://mirrors.aliyun.com/pypi/simple{% endif %}"
PIP_TRUSTED_HOST = "{% if env.CI is defined %}pypi.org{% else %}mirrors.aliyun.com{% endif %}"
PYTHON_BUILD_MIRROR_URL = "{% if env.CI is defined %}https://www.python.org/ftp/python/{% else %}https://mirrors.aliyun.com/python/{% endif %}"

# Ruby acceleration
RUBY_BUILD_MIRROR_URL = "{% if env.CI is defined %}https://cache.ruby-lang.org/pub/ruby/{% else %}https://mirrors.aliyun.com/ruby-build/{% endif %}"

# Go acceleration
GOPROXY = "{% if env.CI is defined %}https://proxy.golang.org,direct{% else %}https://mirrors.aliyun.com/goproxy/,direct{% endif %}"
MISE_GO_DOWNLOAD_MIRROR = "{% if env.CI is defined %}https://dl.google.com/go/{% else %}https://mirrors.aliyun.com/golang/{% endif %}"
# Skip SHA256 verification for Go downloads from mirrors that don't provide checksum files
# Aliyun mirror doesn't provide .sha256 files, causing mise installation failures
# In CI, we use official mirror which provides checksums for security
MISE_GO_SKIP_CHECKSUM = "{% if env.CI is defined %}0{% else %}1{% endif %}"

# Rust & Cargo acceleration
RUSTUP_DIST_SERVER = "{% if env.CI is defined %}https://static.rust-lang.org{% else %}https://mirrors.aliyun.com/rustup{% endif %}"
RUSTUP_UPDATE_ROOT = "{% if env.CI is defined %}https://static.rust-lang.org/rustup{% else %}https://mirrors.aliyun.com/rustup/rustup{% endif %}"
