---
# Hadolint configuration for Dockerfile linting
# Documentation: https://github.com/hadolint/hadolint#configure

# Ignore specific rules globally
ignore:
  # DL3008: Pin versions in apt-get install — acceptable in templates
  - DL3008
  # DL3009: Delete the apt-get lists — overly strict for base images
  - DL3009
  # DL3059: Multiple consecutive RUN instructions — style preference
  - DL3059
  # SC2086: Double quote to prevent globbing — handled by shellcheck
  - SC2086

# Treat specific rules as warnings instead of errors
# format: [rule]: warning
failure-threshold: error

# Trusted Docker registries (images from these are not flagged as "foreign")
trustedRegistries:
  - docker.io
  - ghcr.io
  - public.ecr.aws
  - registry.k8s.io
  - quay.io
