    directory: "/"
    target-branch: "dev"
    open-pull-requests-limit: 5
    rebase-strategy: "auto"
    groups:
      all-dependencies:
        patterns: ["*"]
        update-types:
          - "patch"
          - "minor"
          - "major"
    schedule:
      interval: "weekly"
      day: "monday"
    cooldown:
      default-days: 7
    commit-message:
      prefix: "build(deps):"
    labels:
      - "dependencies"
      - "devcontainers"
      - "infrastructure"

