---
# CD (Continuous Deployment)
# Purpose: Unified release pipeline covering Project Verification and Automated Release Orchestration.
# Trigger: Every push to the default branch (main).
# Design:
#   - Sequential execution: Verify -> Release Please.
#   - Atomic: Release only happens if verification passes.
#   - Secure: Eliminates workflow_run risks by using internal job dependencies.

name: "🚀 Continuous Delivery"

"on":
  push:
    branches:
      - "main"
      - "dev"
  workflow_dispatch:

permissions:
  contents: read

env:
  MISE_LOCKED: 1

jobs:
  # 1. Project Verification Stage (Verify)
  verify:
    name: "🏁 Pre-flight Integrity Check (${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    environment: development
    concurrency:
      group: verify-${{ github.workflow }}-${{ matrix.os }}-${{ github.ref }}
      cancel-in-progress: ${{ github.event_name == 'pull_request' }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    permissions:
      contents: read
      statuses: write
      security-events: write
    timeout-minutes: 50
    env:
      PYTHONUTF8: 1
    steps:
      - name: "🔒 Harden Runner (Security Egress Audit)"
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            *.githubusercontent.com:443
            github.com:443
            mise.run:443
            install.mise.jdx.dev:443
            *.mise.jdx.dev:443
            packages.microsoft.com:443
            *.ubuntu.com:80
            *.ubuntu.com:443
            *.debian.org:80
            *.debian.org:443
            *.rockylinux.org:443
            *.centos.org:443
            *.redhat.com:443
            dl-cdn.alpinelinux.org:443
            registry.npmjs.org:443
            registry.yarnpkg.com:443
            pypi.org:443
            files.pythonhosted.org:443
            proxy.golang.org:443
            sum.golang.org:443
            index.crates.io:443
            static.rust-lang.org:443
            packagist.org:443
            repo.maven.apache.org:443
            rubygems.org:443
            registry.terraform.io:443
            formulae.brew.sh:443
            repo.yarnpkg.com:443
            mise.jdx.dev:443
            ghcr.io:443
            pkg-containers.githubusercontent.com:443
            public.ecr.aws:443
            production.cloudflare.docker.com:443
            *.gcr.io:443
            *.pkg.dev:443
            *.quay.io:443
            *.dkr.ecr.*.amazonaws.com:443
            *.azurecr.io:443
            osv-vulnerabilities.storage.googleapis.com:443
            api.osv.dev:443
            get.trivy.dev:443
            *.aquasecurity.github.io:443
            *.sigstore.dev:443

      - name: "📂 Checkout Repository Code"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Pass GitHub Token to avoid triggering Rate Limit when accessing github.com links
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false
          fetch-depth: 0

      - name: "⚡ Cache Mise Tools"
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.local/bin
            ~/.local/share/mise
            ~/Library/Application Support/mise
            ~/AppData/Local/mise
          key: ${{ runner.os }}-mise-${{ hashFiles('.mise.toml', 'mise.lock', 'scripts/lib/versions.sh') }}
          restore-keys: |
            ${{ runner.os }}-mise-
            ${{ runner.os }}-

      - name: "🚀 Initialize Development Environment"
        shell: sh
        run: |
          # Debug: Show environment before setup
          echo "=== DEBUG: Environment Detection ==="
          echo "GITHUB_PATH: ${GITHUB_PATH:-}"
          echo "GITHUB_ACTIONS: ${GITHUB_ACTIONS:-}"
          echo "OS (uname): $(uname -s)"
          echo "HOME: $HOME"
          echo "LOCALAPPDATA: ${LOCALAPPDATA:-}"
          echo "cygpath: $(command -v cygpath >/dev/null 2>&1 && echo yes || echo no)"
          if command -v cygpath >/dev/null 2>&1 && [ -n "${LOCALAPPDATA:-}" ]; then
            echo "LOCALAPPDATA (Unix): $(cygpath -u "${LOCALAPPDATA}")"
          fi

          make setup
          make install

          # Debug: Show what was written to GITHUB_PATH
          echo "=== DEBUG: GITHUB_PATH Contents ==="
          if [ -f "${GITHUB_PATH:-}" ]; then
            cat "${GITHUB_PATH}"
            echo "--- Lines: $(wc -l < "${GITHUB_PATH}") ---"
          else
            echo "GITHUB_PATH file not found"
          fi
          echo "=== DEBUG: Current PATH (first 20) ==="
          echo "$PATH" | tr ':' '\n' | head -20
          echo "=== DEBUG: Mise Installation ==="
          ls -la "$HOME/.local/share/mise/shims" 2>/dev/null || echo "$HOME/.local/share/mise/shims not found"
          if command -v cygpath >/dev/null 2>&1 && [ -n "${LOCALAPPDATA:-}" ]; then
            _local_app=$(cygpath -u "${LOCALAPPDATA}")
            ls -la "${_local_app}/mise/shims" 2>/dev/null || echo "${_local_app}/mise/shims not found"
          fi
          echo "=== DEBUG: Tool Check (prettier) ==="
          which prettier || echo "prettier not in PATH"
          command -v prettier || echo "prettier not found"
        env:
          GITHUB_TOKEN: ${{ secrets.WORKFLOW_SECRET || secrets.GITHUB_TOKEN }}

      - name: "🩺 Verify Environment Health"
        shell: sh
        # Run in a separate step so GITHUB_PATH entries written by make setup
        # (mise shims) are visible in this step's PATH.
        run: |
          # Ensure mise shims are on PATH
          if [ -d "$HOME/.local/share/mise/shims" ]; then
            export PATH="$HOME/.local/share/mise/shims:$PATH"
          fi
          if command -v cygpath >/dev/null 2>&1 && [ -n "${LOCALAPPDATA:-}" ]; then
            _local_app=$(cygpath -u "${LOCALAPPDATA}")
            if [ -d "${_local_app}/mise/shims" ]; then
              export PATH="${_local_app}/mise/shims:$PATH"
            fi
          fi

          make check-env
        env:
          GITHUB_TOKEN: ${{ secrets.WORKFLOW_SECRET || secrets.GITHUB_TOKEN }}

      - name: "📝 Validate Commit Convention (Commitlint)"
        shell: sh
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          # Debug: Check commitlint availability
          echo "=== DEBUG: Tool Check (commitlint) ==="
          which commitlint || echo "commitlint not in PATH"
          command -v commitlint || echo "commitlint not found"
          echo "PATH (first 10):"
          echo "$PATH" | tr ':' '\n' | head -10

          # Source common.sh to get helper functions
          . scripts/lib/common.sh

          # Build NODE_PATH from mise npm installations (avoid SC2155)
          _node_path=$(build_mise_node_path)
          export NODE_PATH="${_node_path}"

          if [ "$EVENT_NAME" = "pull_request" ]; then
            mise exec -- commitlint --from "$BASE_SHA" --to "$HEAD_SHA" --verbose
          else
            mise exec -- commitlint --last --verbose
          fi

      - name: "🧪 Execute Full Quality & Safety Verification"
        shell: sh
        run: |
          # Ensure mise shims are on PATH for all commands
          # Add both possible mise shims locations
          if [ -d "$HOME/.local/share/mise/shims" ]; then
            export PATH="$HOME/.local/share/mise/shims:$PATH"
            echo "Added to PATH: $HOME/.local/share/mise/shims"
          fi
          if command -v cygpath >/dev/null 2>&1 && [ -n "${LOCALAPPDATA:-}" ]; then
            _local_app=$(cygpath -u "${LOCALAPPDATA}")
            if [ -d "${_local_app}/mise/shims" ]; then
              export PATH="${_local_app}/mise/shims:$PATH"
              echo "Added to PATH: ${_local_app}/mise/shims"
            fi
          fi

          # Debug: Verify PATH and tool availability
          echo "=== DEBUG: PATH after mise shims addition ==="
          echo "$PATH" | tr ':' '\n' | head -10
          echo "=== DEBUG: Tool availability check ==="
          command -v prettier || echo "prettier not found"
          command -v pnpm || echo "pnpm not found"

          make lint
          make test
          make audit
          # Extra SARIF export for GitHub Security Tab (Offline to prevent API rate limits)
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            mise exec -- zizmor . --format sarif --offline --config .zizmor.yml > zizmor-results.sarif
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.WORKFLOW_SECRET || secrets.GITHUB_TOKEN }}
          PYTHONUTF8: 1
          TRIVY_CACHE_DIR: .trivycache

      - name: "⚡ Cache Documentation Links (Lychee)"
        if: matrix.os == 'ubuntu-latest'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .lycheecache
          key: ${{ runner.os }}-lychee-${{ hashFiles('**/*.md') }}
          restore-keys: |
            ${{ runner.os }}-lychee-

      - name: "🔗 Verify Documentation Links (Lychee)"
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        if: ${{ always() && matrix.os == 'ubuntu-latest' }}
        continue-on-error: true # Don't block CD on link check failures (network issues, rate limits, etc.)
        with:
          args: --config lychee.toml '**/*.md'
          fail: true
        env:
          # Pass GitHub token to avoid rate limiting and access private repos
          GITHUB_TOKEN: ${{ secrets.WORKFLOW_SECRET || secrets.GITHUB_TOKEN }}

      - name: "🕵️ Detect Vulnerabilities (Trivy FS)"
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        if: ${{ always() && matrix.os == 'ubuntu-latest' }}
        env:
          TRIVY_DB_REPOSITORY: "public.ecr.aws/aquasecurity/trivy-db"
          TRIVY_CHECKS_BUNDLE_REPOSITORY: "public.ecr.aws/aquasecurity/trivy-checks"
        with:
          scan-type: "fs"
          ignore-unfixed: true
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH,MEDIUM,LOW"
          exit-code: "1"

      - name: "📤 Upload Security Audit (SARIF)"
        uses: github/codeql-action/upload-sarif@e46ed2cbd01164d986452f91f178727624ae40d7 # v4.35.3
        if: always() && matrix.os == 'ubuntu-latest'
        with:
          sarif_file: "."

  # 2. Release Orchestration Stage (Release Please)
  release-please:
    name: "🚀 Release Orchestration"
    needs: [verify]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: internal
    concurrency:
      group: release-${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    permissions:
      contents: write
      pull-requests: write
      statuses: write
      security-events: write
    timeout-minutes: 50
    steps:
      - name: "📝 Orchestrate Release Lifecycle (Release Please)"
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json
          target-branch: ${{ github.ref_name }}

      - name: "🏗️ Checkout Release PR Branch"
        if: ${{ steps.release.outputs.pr }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ fromJson(steps.release.outputs.pr).headBranchName }}
          # Pass GitHub Token to avoid triggering Rate Limit when accessing github.com links
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false

      - name: "📦 Setup Node Environment (Syncing)"
        if: ${{ steps.release.outputs.pr }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20.18.3"
          cache: ""

      - name: "📦 Setup pnpm Environment"
        if: ${{ steps.release.outputs.pr && hashFiles('pnpm-lock.yaml') != '' }}
        uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5
        with:
          run_install: false

      - name: "🔗 Synchronize Manifests & Lockfiles"
        if: ${{ steps.release.outputs.pr }}
        shell: sh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f "pnpm-lock.yaml" ]; then
            pnpm install --no-frozen-lockfile
          elif [ -f "yarn.lock" ]; then
            yarn install --no-immutable
          elif [ -f "package-lock.json" ]; then
            npm install --package-lock-only
          fi
          git add .
          git commit --signoff -m "chore(release): synchronize lockfiles for version bump" || echo "No changes to sync"
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD
        env:
          GITHUB_TOKEN: ${{ secrets.WORKFLOW_SECRET || secrets.GITHUB_TOKEN }}
