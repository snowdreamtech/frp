---
# 🛡️ OpenSSF Scorecard Monitoring
# Purpose: Holistically evaluates the repository for security best practices.
# Trigger: Weekly schedule and push to main.
# Output: Results visible in the GitHub "Security" tab and as a public scorecard.

name: "🛡️ Scorecard Security Audit"

"on":
  # For Branch-Protection check. Only the default branch is supported. See
  # https://github.com/ossf/scorecard-action#removal-of-branch-protection-check
  # on how to set up this check.
  branch_protection_rule:
  # Schedule every Monday at 00:00 UTC
  schedule:
    - cron: "0 0 * * 1"
  push:
    branches: ["main"]

# Declare default permissions as read only.
permissions: read-all

jobs:
  analysis:
    name: "🔍 Scorecard Analysis"
    runs-on: ubuntu-latest
    permissions:
      # Needed to upload the results to code-scanning dashboard.
      security-events: write
      # Needed to publish results and get a badge (see publish_results below).
      id-token: write
      # Required for checking repository contents.
      contents: read
      # Required for checking branch protection rules.
      actions: read
    timeout-minutes: 40

    steps:
      - name: "🔒 Harden Runner"
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          disable-sudo: true
          egress-policy: block
          allowed-endpoints: >
            *.aquasecurity.github.io:443
            *.azurecr.io:443
            *.centos.org:443
            *.debian.org:443
            *.debian.org:80
            *.dkr.ecr.*.amazonaws.com:443
            *.gcr.io:443
            *.githubusercontent.com:443
            *.pkg.dev:443
            *.quay.io:443
            *.redhat.com:443
            *.rockylinux.org:443
            *.sigstore.dev:443
            *.ubuntu.com:443
            *.ubuntu.com:80
            api.github.com:443
            api.osv.dev:443
            api.securityscorecards.dev:443
            auth.docker.io:443
            cdn.deno.land:443
            deno.land:443
            dl-cdn.alpinelinux.org:443
            downloads.gradle-dn.com:443
            downloads.gradle.org:443
            files.pythonhosted.org:443
            formulae.brew.sh:443
            get.trivy.dev:443
            ghcr.io:443
            github.com:443
            index.crates.io:443
            index.docker.io:443
            nodejs.org:443
            oss-fuzz-build-logs.storage.googleapis.com:443
            osv-vulnerabilities.storage.googleapis.com:443
            packages.microsoft.com:443
            packagist.org:443
            pkg-containers.githubusercontent.com:443
            production.cloudflare.docker.com:443
            proxy.golang.org:443
            public.ecr.aws:443
            pypi.org:443
            registry-1.docker.io:443
            registry.npmjs.org:443
            registry.terraform.io:443
            registry.yarnpkg.com:443
            repo.maven.apache.org:443
            repo.yarnpkg.com:443
            rubygems.org:443
            services.gradle.org:443
            static.rust-lang.org:443
            sum.golang.org:443
            www.bestpractices.dev:443
            storage.googleapis.com:443
            go.dev:443
            golang.org:443
            *.actions.githubusercontent.com:443
            *.blob.core.windows.net:443
      - name: "📂 Checkout Repository Code"
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: "🔍 Run Scorecard Action"
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # (Optional) "repo_token" is only needed for checking Branch-Protection of private repos.
          # For public repos, this can be omitted or passed via secrets.GITHUB_TOKEN.
          publish_results: true

      # Upload the results to GitHub's code scanning dashboard.
      - name: "📤 Upload SARIF Results"
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: results.sarif
