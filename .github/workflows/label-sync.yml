---
name: "🏷️ Label Synchronization"

"on":
  push:
    branches: ["main", "dev"]
    paths:
      - "scripts/sync-labels.sh"
      - ".github/workflows/label-sync.yml"
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  sync:
    name: "🔄 Sync Repo Labels"
    runs-on: ubuntu-latest
    environment: development
    concurrency:
      group: label-sync-${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    timeout-minutes: 30
    steps:
      - name: "🔒 Harden Runner (Security Egress Audit)"
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            *.githubusercontent.com:443
            github.com:443
            mise.run:443
            install.mise.jdx.dev:443
            *.mise.jdx.dev:443

      - name: "📂 Checkout Repository Code"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false

      - name: "⚡ Cache Mise Tools"
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.local/bin
            ~/.local/share/mise
            ~/Library/Application Support/mise
            ~/AppData/Local/mise
          key: ${{ runner.os }}-mise-${{ hashFiles('.mise.toml', 'mise.lock', 'scripts/lib/versions.sh') }}
          restore-keys: |
            ${{ runner.os }}-mise-

      - name: "🚀 Initialize Development Environment"
        shell: sh
        run: |
          make setup
          make install
        env:
          GITHUB_TOKEN: ${{ secrets.WORKFLOW_SECRET || secrets.GITHUB_TOKEN }}

      - name: "🩺 Verify Environment Health"
        shell: sh
        # Run in a separate step so GITHUB_PATH entries written by make setup
        # (mise shims) are visible in this step's PATH.
        run: |
          make check-env
        env:
          GITHUB_TOKEN: ${{ secrets.WORKFLOW_SECRET || secrets.GITHUB_TOKEN }}

      - name: "🏷️ Sync Labels via gh CLI"
        shell: sh
        env:
          GITHUB_TOKEN: ${{ secrets.WORKFLOW_SECRET || secrets.GITHUB_TOKEN }}
        run: |
          make sync-labels
