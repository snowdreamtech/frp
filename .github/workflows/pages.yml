---
# Deploy Docs to GitHub Pages
# Purpose: Builds the VitePress documentation site and deploys it to GitHub Pages.
# Trigger: Runs on pushes to 'main' affecting 'docs/' or dependency manifests.
# Permissions:
#   - contents: read (Required for repository checkout).
#   - pages: write (Required for deploying to GitHub Pages).
#   - id-token: write (Required for OIDC-based deployment).
# Concurrency:
#   - group: pages (Ensures atomic documentation deployments).
#   - cancel-in-progress: false (Deploys must complete to ensure site consistency).
# Design:
#   - Decouples build and deployment jobs for enhanced traceability.
#   - Uses specific semantic version tags for VitePress and setup actions.

name: "📄 Deploy Docs to GitHub Pages"

"on":
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "package.json"
      - "pnpm-lock.yaml"
  workflow_dispatch:
    inputs:
      venv:
        description: "Virtual environment path"
        required: false
        default: ".venv"

permissions: {}

env:
  MISE_LOCKED: 1

jobs:
  build:
    name: "🏗️ Documentation Compilation"
    runs-on: ubuntu-latest
    concurrency:
      group: pages-build-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: false # Never cancel in-progress deploys to avoid inconsistent states
    permissions:
      contents: read # Required for repository checkout
    timeout-minutes: 50
    env:
      VENV: ${{ github.event.inputs.venv || '.venv' }}
      PYTHONUTF8: 1

    steps:
      - name: "🔒 Harden Runner (Security Egress Audit)"
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            *.githubusercontent.com:443
            github.com:443
            mise.run:443
            install.mise.jdx.dev:443
            *.mise.jdx.dev:443
            packages.microsoft.com:443
            *.ubuntu.com:80
            *.ubuntu.com:443
            *.debian.org:80
            *.debian.org:443
            *.rockylinux.org:443
            *.centos.org:443
            *.redhat.com:443
            dl-cdn.alpinelinux.org:443
            registry.npmjs.org:443
            registry.yarnpkg.com:443
            pypi.org:443
            files.pythonhosted.org:443
            proxy.golang.org:443
            sum.golang.org:443
            index.crates.io:443
            static.rust-lang.org:443
            packagist.org:443
            repo.maven.apache.org:443
            rubygems.org:443
            registry.terraform.io:443
            formulae.brew.sh:443
            repo.yarnpkg.com:443

      - name: "📂 Checkout Repository Code"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        # Fetches source documentation and site assets for the build process.
        with:
          # Pass GitHub Token to avoid triggering Rate Limit when accessing github.com links
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          persist-credentials: false

      - name: "⚡ Cache Mise Tools"
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.local/bin
            ~/.local/share/mise
            ~/Library/Application Support/mise
            ~/AppData/Local/mise
          key: ${{ runner.os }}-mise-${{ hashFiles('.mise.toml', 'mise.lock', 'scripts/lib/versions.sh') }}
          restore-keys: |
            ${{ runner.os }}-mise-

      - name: "🚀 Initialize Development Environment"
        shell: sh # POSIX compliant
        env:
          GITHUB_TOKEN: ${{ secrets.WORKFLOW_SECRET || secrets.GITHUB_TOKEN }}
        run: |
          make setup
          make install

      - name: "🚀 compile documentation artifacts"
        shell: sh
        run: |
          # executes the documentation manager to install dependencies and build site.
          make docs ARGS="build"
        env:
          GITHUB_TOKEN: ${{ secrets.WORKFLOW_SECRET || secrets.GITHUB_TOKEN }}

      - name: "📦 Stage Assets for Web Deployment"
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v4.1.1
        with:
          # Bundles the compiled static site into a secure artifact for GitHub Pages.
          path: docs/.vitepress/dist

  deploy:
    name: "🚀 Live Web Deployment"
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write # Required for deploying to GitHub Pages
      id-token: write # Required for OIDC-based deployment
    concurrency:
      group: pages-deploy
      cancel-in-progress: false
    timeout-minutes: 40
    steps:
      - name: "🔒 Harden Runner (Security Egress Audit)"
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            *.githubusercontent.com:443
            github.com:443
            mise.run:443
            install.mise.jdx.dev:443
            *.mise.jdx.dev:443
            packages.microsoft.com:443
            *.ubuntu.com:80
            *.ubuntu.com:443
            *.debian.org:80
            *.debian.org:443
            *.rockylinux.org:443
            *.centos.org:443
            *.redhat.com:443
            dl-cdn.alpinelinux.org:443
            registry.npmjs.org:443
            registry.yarnpkg.com:443
            pypi.org:443
            files.pythonhosted.org:443
            proxy.golang.org:443
            sum.golang.org:443
            index.crates.io:443
            static.rust-lang.org:443
            packagist.org:443
            repo.maven.apache.org:443
            rubygems.org:443
            registry.terraform.io:443
            formulae.brew.sh:443
            repo.yarnpkg.com:443

      - name: "🚀 Deploy to GitHub Pages"
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
        # Finalizes the deployment, making the new documentation live.
