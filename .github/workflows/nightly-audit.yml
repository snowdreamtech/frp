---
name: "🌙 Nightly Security Audit"

"on":
  schedule:
    # Run at 00:00 UTC every day
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  audit:
    name: "🔍 Full Security Audit"
    runs-on: ubuntu-latest
    environment: development
    timeout-minutes: 120
    steps:
      - name: "🔒 Harden Runner (Security Egress Audit)"
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            *.githubusercontent.com:443
            github.com:443
            mise.run:443
            install.mise.jdx.dev:443
            *.mise.jdx.dev:443
            mise.jdx.dev:443
            ghcr.io:443
            pkg-containers.githubusercontent.com:443
            public.ecr.aws:443
            production.cloudflare.docker.com:443
            osv-vulnerabilities.storage.googleapis.com:443
            api.osv.dev:443
            get.trivy.dev:443
            *.aquasecurity.github.io:443
            *.sigstore.dev:443
            api.securityscorecards.dev:443
            oss-fuzz-build-logs.storage.googleapis.com:443
            www.bestpractices.dev:443

      - name: "📂 Checkout Repository Code"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          persist-credentials: false

      - name: "⚡ Setup mise (Tool Manager)"
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      - name: "🛡️ Run Security Audit"
        shell: sh
        env:
          GITHUB_TOKEN: ${{ secrets.WORKFLOW_SECRET || secrets.GITHUB_TOKEN }}
        run: |
          # We run make audit which includes gitleaks, osv-scanner, etc.
          make audit

      - name: "🚨 Report Vulnerabilities"
        if: failure()
        shell: sh
        env:
          GITHUB_TOKEN: ${{ secrets.WORKFLOW_SECRET || secrets.GITHUB_TOKEN }}
        run: |
          _TITLE="🚨 Nightly Security Audit Failed: Vulnerabilities Detected"
          _BODY="The scheduled nightly security audit detected vulnerabilities or secrets in the codebase.

          **Run History:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          Please run \`make audit\` locally to investigate and fix these issues."

          # Check if an open issue with the same title already exists to avoid duplication
          _EXISTS=$(gh issue list --search "$_TITLE" --state open --json number --jq ".[0].number")

          if [ -z "$_EXISTS" ]; then
            gh issue create --title "$_TITLE" --body "$_BODY" --label "security,bug"
          else
            echo "Issue already exists: #$_EXISTS. Skipping creation."
          fi
