---
# CI (Continuous Integration)
# Purpose: Unified development pipeline covering Code Quality, Testing, and Security Auditing.
# Trigger: Every push and PR on non-main branches.
# Design:
#   - Sequential execution: Lint -> Test -> Audit.
#   - Fail-fast: Stop early if early stages fail to save resources.
#   - Secure: Runs in the context of the triggered ref, avoiding workflow_run risks.

name: "🔄 Continuous Integration"

"on":
  pull_request:
    branches:
      - "main"
      - "dev"
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read

env:
  MISE_LOCKED: 1

jobs:
  # 0. Security Guard Stage (PR Only)
  dependency-review:
    name: "🛡️ Dependency Review"
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: "🔒 Harden Runner (Security Egress Audit)"
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            *.githubusercontent.com:443
            github.com:443
            mise.run:443
            install.mise.jdx.dev:443
            *.mise.jdx.dev:443
            packages.microsoft.com:443
            *.ubuntu.com:80
            *.ubuntu.com:443
            *.debian.org:80
            *.debian.org:443
            *.rockylinux.org:443
            *.centos.org:443
            *.redhat.com:443
            dl-cdn.alpinelinux.org:443
            registry.npmjs.org:443
            registry.yarnpkg.com:443
            pypi.org:443
            files.pythonhosted.org:443
            proxy.golang.org:443
            sum.golang.org:443
            index.crates.io:443
            static.rust-lang.org:443
            packagist.org:443
            repo.maven.apache.org:443
            rubygems.org:443
            registry.terraform.io:443
            formulae.brew.sh:443
            repo.yarnpkg.com:443
            mise.jdx.dev:443
            ghcr.io:443
            pkg-containers.githubusercontent.com:443
            public.ecr.aws:443
            production.cloudflare.docker.com:443
            *.gcr.io:443
            *.pkg.dev:443
            *.quay.io:443
            *.dkr.ecr.*.amazonaws.com:443
            *.azurecr.io:443
            osv-vulnerabilities.storage.googleapis.com:443
            api.osv.dev:443
            get.trivy.dev:443
            *.aquasecurity.github.io:443
            *.sigstore.dev:443

      - name: "📂 Checkout Repository Code"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false

      - name: "🔍 Dependency Review"
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0

  # 1. Code Quality Stage (Lint)
  lint:
    name: "🛡️ Quality Assurance Gate (${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    environment: development
    concurrency:
      group: lint-${{ github.workflow }}-${{ matrix.os }}-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    permissions:
      contents: read
      security-events: write
    timeout-minutes: 60
    env:
      VENV: ".venv"
      PYTHONUTF8: 1
    steps:
      - name: "🔒 Harden Runner (Security Egress Audit)"
        if: matrix.os == 'ubuntu-latest'
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            *.githubusercontent.com:443
            github.com:443
            mise.run:443
            install.mise.jdx.dev:443
            *.mise.jdx.dev:443
            packages.microsoft.com:443
            *.ubuntu.com:80
            *.ubuntu.com:443
            *.debian.org:80
            *.debian.org:443
            *.rockylinux.org:443
            *.centos.org:443
            *.redhat.com:443
            dl-cdn.alpinelinux.org:443
            registry.npmjs.org:443
            registry.yarnpkg.com:443
            pypi.org:443
            files.pythonhosted.org:443
            proxy.golang.org:443
            sum.golang.org:443
            index.crates.io:443
            static.rust-lang.org:443
            packagist.org:443
            repo.maven.apache.org:443
            rubygems.org:443
            registry.terraform.io:443
            formulae.brew.sh:443
            repo.yarnpkg.com:443
            mise.jdx.dev:443
            ghcr.io:443
            pkg-containers.githubusercontent.com:443
            public.ecr.aws:443
            production.cloudflare.docker.com:443
            *.gcr.io:443
            *.pkg.dev:443
            *.quay.io:443
            *.dkr.ecr.*.amazonaws.com:443
            *.azurecr.io:443
            osv-vulnerabilities.storage.googleapis.com:443
            api.osv.dev:443
            get.trivy.dev:443
            *.aquasecurity.github.io:443
            *.sigstore.dev:443

      - name: "📂 Checkout Repository Code"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Pass GitHub Token to avoid triggering Rate Limit when accessing github.com links
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false

      - name: "⚡ Cache Mise Tools"
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.local/bin
            ~/.local/share/mise
            ~/Library/Application Support/mise
            ~/AppData/Local/mise
          key: ${{ runner.os }}-mise-${{ hashFiles('.mise.toml', 'mise.lock', 'scripts/lib/versions.sh') }}
          restore-keys: |
            ${{ runner.os }}-mise-

      - name: "🚀 Initialize Development Environment"
        shell: sh
        run: |
          # Debug: Show environment before setup
          echo "=== DEBUG: Environment Detection ==="
          echo "GITHUB_PATH: ${GITHUB_PATH:-}"
          echo "GITHUB_ACTIONS: ${GITHUB_ACTIONS:-}"
          echo "OS (uname): $(uname -s)"
          echo "HOME: $HOME"
          echo "LOCALAPPDATA: ${LOCALAPPDATA:-}"
          echo "cygpath: $(command -v cygpath >/dev/null 2>&1 && echo yes || echo no)"
          if command -v cygpath >/dev/null 2>&1 && [ -n "${LOCALAPPDATA:-}" ]; then
            echo "LOCALAPPDATA (Unix): $(cygpath -u "${LOCALAPPDATA}")"
          fi

          make setup
          make install

          # Debug: Show what was written to GITHUB_PATH
          echo "=== DEBUG: GITHUB_PATH Contents ==="
          if [ -f "${GITHUB_PATH:-}" ]; then
            cat "${GITHUB_PATH}"
            echo "--- Lines: $(wc -l < "${GITHUB_PATH}") ---"
          else
            echo "GITHUB_PATH file not found"
          fi
          echo "=== DEBUG: Current PATH (first 20) ==="
          echo "$PATH" | tr ':' '\n' | head -20
          echo "=== DEBUG: Mise Installation ==="
          ls -la "$HOME/.local/share/mise/shims" 2>/dev/null || echo "$HOME/.local/share/mise/shims not found"
          if command -v cygpath >/dev/null 2>&1 && [ -n "${LOCALAPPDATA:-}" ]; then
            _local_app=$(cygpath -u "${LOCALAPPDATA}")
            ls -la "${_local_app}/mise/shims" 2>/dev/null || echo "${_local_app}/mise/shims not found"
          fi
          echo "=== DEBUG: Tool Check (prettier) ==="
          which prettier || echo "prettier not in PATH"
          command -v prettier || echo "prettier not found"
        env:
          GITHUB_TOKEN: ${{ secrets.WORKFLOW_SECRET || secrets.GITHUB_TOKEN }}

      - name: "🩺 Verify Environment Health"
        shell: sh
        # Run in a separate step so GITHUB_PATH entries written by make setup
        # (mise shims) are visible in this step's PATH.
        run: |
          make check-env
        env:
          GITHUB_TOKEN: ${{ secrets.WORKFLOW_SECRET || secrets.GITHUB_TOKEN }}

      - name: "🔍 Inspect Code Quality (Lint)"
        shell: sh
        run: |
          make lint
        env:
          GITHUB_TOKEN: ${{ secrets.WORKFLOW_SECRET || secrets.GITHUB_TOKEN }}

  # 2. Automated Testing Stage (Test)
  test:
    name: "🧪 Automated Testing Suite (${{ matrix.os }})"
    needs: [lint]
    runs-on: ${{ matrix.os }}
    environment: development
    concurrency:
      group: test-${{ github.workflow }}-${{ matrix.os }}-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    permissions:
      contents: read
      pull-requests: read
    timeout-minutes: 60
    env:
      VENV: ".venv"
      PYTHONUTF8: 1
    steps:
      - name: "🔒 Harden Runner (Security Egress Audit)"
        if: matrix.os == 'ubuntu-latest'
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            *.githubusercontent.com:443
            github.com:443
            mise.run:443
            install.mise.jdx.dev:443
            *.mise.jdx.dev:443
            packages.microsoft.com:443
            *.ubuntu.com:80
            *.ubuntu.com:443
            *.debian.org:80
            *.debian.org:443
            *.rockylinux.org:443
            *.centos.org:443
            *.redhat.com:443
            dl-cdn.alpinelinux.org:443
            registry.npmjs.org:443
            registry.yarnpkg.com:443
            pypi.org:443
            files.pythonhosted.org:443
            proxy.golang.org:443
            sum.golang.org:443
            index.crates.io:443
            static.rust-lang.org:443
            packagist.org:443
            repo.maven.apache.org:443
            rubygems.org:443
            registry.terraform.io:443
            formulae.brew.sh:443
            repo.yarnpkg.com:443
            mise.jdx.dev:443
            ghcr.io:443
            pkg-containers.githubusercontent.com:443
            public.ecr.aws:443
            production.cloudflare.docker.com:443
            *.gcr.io:443
            *.pkg.dev:443
            *.quay.io:443
            *.dkr.ecr.*.amazonaws.com:443
            *.azurecr.io:443
            osv-vulnerabilities.storage.googleapis.com:443
            api.osv.dev:443
            get.trivy.dev:443
            *.aquasecurity.github.io:443
            *.sigstore.dev:443

      - name: "📂 Checkout Repository Code"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Pass GitHub Token to avoid triggering Rate Limit when accessing github.com links
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false

      - name: "⚡ Cache Mise Tools"
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.local/bin
            ~/.local/share/mise
            ~/Library/Application Support/mise
            ~/AppData/Local/mise
          key: ${{ runner.os }}-mise-${{ hashFiles('.mise.toml', 'mise.lock', 'scripts/lib/versions.sh') }}
          restore-keys: |
            ${{ runner.os }}-mise-

      - name: "📦 Cache Language Dependencies (Advanced)"
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
            ~/.npm
            ~/.cache/pip
            ~/.cargo/bin
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            ~/.bundle/cache
            ~/.composer/cache
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.m2/repository
            ~/.pub-cache
            ~/.bun/install/cache
            .build
            _build
            deps
            vendor
            node_modules
            target
          key: ${{ runner.os }}-lang-${{ hashFiles('**/go.mod', '**/package-lock.json', '**/requirements.txt', '**/Cargo.lock', '**/Gemfile.lock', '**/composer.lock', '**/build.gradle*', '**/pom.xml', '**/Package.resolved', '**/pubspec.lock', '**/mix.lock', '**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-lang-

      - name: "🚀 Initialize Development Environment"
        shell: sh
        run: |
          make setup
          make install
        env:
          GITHUB_TOKEN: ${{ secrets.WORKFLOW_SECRET || secrets.GITHUB_TOKEN }}

      - name: "🩺 Verify Environment Health"
        shell: sh
        # Run in a separate step so GITHUB_PATH entries written by make setup
        # (mise shims) are visible in this step's PATH.
        run: |
          make check-env
        env:
          GITHUB_TOKEN: ${{ secrets.WORKFLOW_SECRET || secrets.GITHUB_TOKEN }}

      - name: "🧪 Execute Multi-Stack Test Suite"
        shell: sh
        run: |
          make test
        env:
          GITHUB_TOKEN: ${{ secrets.WORKFLOW_SECRET || secrets.GITHUB_TOKEN }}

  # 3. Security & Standards Audit Stage (Audit)
  audit:
    name: "🕵️ Security & Standards Audit (ubuntu-latest)"
    needs: [test]
    runs-on: ubuntu-latest
    environment: development
    concurrency:
      group: audit-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true
    permissions:
      contents: read
      pull-requests: read
      statuses: write
      security-events: write
    timeout-minutes: 60
    env:
      VENV: ".venv"
      PYTHONUTF8: 1
    steps:
      - name: "🔒 Harden Runner (Security Egress Audit)"
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            *.githubusercontent.com:443
            github.com:443
            mise.run:443
            install.mise.jdx.dev:443
            *.mise.jdx.dev:443
            packages.microsoft.com:443
            *.ubuntu.com:80
            *.ubuntu.com:443
            *.debian.org:80
            *.debian.org:443
            *.rockylinux.org:443
            *.centos.org:443
            *.redhat.com:443
            dl-cdn.alpinelinux.org:443
            registry.npmjs.org:443
            registry.yarnpkg.com:443
            pypi.org:443
            files.pythonhosted.org:443
            proxy.golang.org:443
            sum.golang.org:443
            index.crates.io:443
            static.rust-lang.org:443
            packagist.org:443
            repo.maven.apache.org:443
            rubygems.org:443
            registry.terraform.io:443
            formulae.brew.sh:443
            repo.yarnpkg.com:443
            mise.jdx.dev:443
            ghcr.io:443
            pkg-containers.githubusercontent.com:443
            public.ecr.aws:443
            production.cloudflare.docker.com:443
            *.gcr.io:443
            *.pkg.dev:443
            *.quay.io:443
            *.dkr.ecr.*.amazonaws.com:443
            *.azurecr.io:443
            osv-vulnerabilities.storage.googleapis.com:443
            api.osv.dev:443
            get.trivy.dev:443
            *.aquasecurity.github.io:443
            *.sigstore.dev:443

      - name: "📂 Checkout Repository Code"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Pass GitHub Token to avoid triggering Rate Limit when accessing github.com links
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false
          fetch-depth: 0

      - name: "⚡ Cache Mise Tools"
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.local/share/mise
            ~/Library/Application Support/mise
            ~/AppData/Local/mise
            .trivycache
          key: ${{ runner.os }}-mise-audit-${{ hashFiles('.mise.toml', 'mise.lock', 'scripts/lib/versions.sh') }}
          restore-keys: |
            ${{ runner.os }}-mise-audit-

      - name: "🚀 Initialize Development Environment"
        shell: sh
        run: |
          make setup
          make install
        env:
          GITHUB_TOKEN: ${{ secrets.WORKFLOW_SECRET || secrets.GITHUB_TOKEN }}

      - name: "🩺 Verify Environment Health"
        shell: sh
        # Run in a separate step so GITHUB_PATH entries written by make setup
        # (mise shims) are visible in this step's PATH.
        run: |
          make check-env
        env:
          GITHUB_TOKEN: ${{ secrets.WORKFLOW_SECRET || secrets.GITHUB_TOKEN }}

      - name: "📝 Validate Commit Convention (Commitlint)"
        shell: sh
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          # Source common.sh to get helper functions
          . scripts/lib/common.sh

          # Build NODE_PATH from mise npm installations (avoid SC2155)
          _node_path=$(build_mise_node_path)
          export NODE_PATH="${_node_path}"

          if [ "$EVENT_NAME" = "pull_request" ]; then
            mise exec -- commitlint --from "$BASE_SHA" --to "$HEAD_SHA" --verbose
          else
            mise exec -- commitlint --last --verbose
          fi

      - name: "🛡️ Perform Security Audit"
        shell: sh
        run: |
          make audit
          # Extra SARIF export for GitHub Security Tab (Offline to prevent API rate limits)
          mise exec -- zizmor . --format sarif --offline --config .zizmor.yml > zizmor-results.sarif
        env:
          GITHUB_TOKEN: ${{ secrets.WORKFLOW_SECRET || secrets.GITHUB_TOKEN }}
          TRIVY_CACHE_DIR: .trivycache

      - name: "⚡ Cache Documentation Links (Lychee)"
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .lycheecache
          key: ${{ runner.os }}-lychee-${{ hashFiles('**/*.md') }}
          restore-keys: |
            ${{ runner.os }}-lychee-

      - name: "🔗 Verify Documentation Links (Lychee)"
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        if: ${{ always() }}
        continue-on-error: true # Don't block CI on link check failures (network issues, rate limits, etc.)
        with:
          args: --config lychee.toml '**/*.md'
          fail: true
        env:
          # Pass GitHub token to avoid rate limiting and access private repos
          GITHUB_TOKEN: ${{ secrets.WORKFLOW_SECRET || secrets.GITHUB_TOKEN }}

      - name: "🕵️ Detect Vulnerabilities (Trivy FS)"
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        if: ${{ always() }}
        env:
          TRIVY_DB_REPOSITORY: "public.ecr.aws/aquasecurity/trivy-db"
          TRIVY_CHECKS_BUNDLE_REPOSITORY: "public.ecr.aws/aquasecurity/trivy-checks"
        with:
          scan-type: "fs"
          ignore-unfixed: true
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH,MEDIUM,LOW"
          exit-code: "1"

      - name: "📤 Upload Security Audit (SARIF)"
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        if: always()
        with:
          sarif_file: "."
