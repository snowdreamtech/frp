# Lychee Link Checker Configuration
# https://lychee.cli.rs/#/usage/config

# Exclude patterns for paths
exclude_path = [
  ".git",
  "node_modules",
  "cmd/unirtm_data",
  ".venv",
  "venv",
  "env",
  "vendor",
  "dist",
  "build",
  "out",
  "target",
  ".next",
  ".nuxt",
  ".output",
  "__pycache__",
  ".specify",
]

# Exclude URL patterns
# Ignore unreleased version compare links in CHANGELOG
exclude = [
  "https://unirtm.snowdream.tech.*",
  "https://github.com/snowdreamtech/UniRTM/discussions",
  ".*docs/glossary.md",
  ".*docs/index.md",                                        # Unreleased version compare links (tags don't exist yet)
  'https://github\.com/.*/compare/.*\.\.\.v\d+\.\d+\.\d+$',
]

# Accept status codes
# 200-299: Success
# 429: Too Many Requests (rate limiting, will retry)
accept = [200, 202, 429]

# Retry configuration
max_retries = 3
retry_wait_time = 2

# Cache configuration
cache = true

# Timeout (in seconds)
timeout = 20

# User agent
user_agent = "lychee/link-checker"

# Verbose output (log level)
verbose = "info"
