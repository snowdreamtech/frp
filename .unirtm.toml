[env]
CONFIG_AUTO_UPDATE = '1'
COREPACK_INTEGRITY_KEYS = '0'
ENABLE_GITHUB_PROXY = '{% if env.CI is defined %}0{% else %}1{% endif %}'
GITHUB_PROXY = '{% if env.CI is defined %}{% else %}https://gh-proxy.sn0wdr1am.com/{% endif %}'
GONOSUMDB = ''
GOPRIVATE = ''
GOPROXY = '{% if env.CI is defined %}https://proxy.golang.org,direct{% else %}https://goproxy.cn,direct{% endif %}'
GOSUMDB = '{% if env.CI is defined %}sum.golang.org{% else %}sum.golang.google.cn{% endif %}'
NODEJS_ORG_MIRROR = '{% if env.CI is defined %}https://nodejs.org/dist/{% else %}https://npmmirror.com/mirrors/node/{% endif %}'
NPM_CONFIG_REGISTRY = '{% if env.CI is defined %}https://registry.npmjs.org{% else %}https://registry.npmmirror.com{% endif %}'
PIP_INDEX_URL = '{% if env.CI is defined %}https://pypi.org/simple{% else %}https://mirrors.aliyun.com/pypi/simple{% endif %}'
PIP_TRUSTED_HOST = '{% if env.CI is defined %}pypi.org{% else %}mirrors.aliyun.com{% endif %}'
PYTHONUTF8 = '1'
PYTHONUNBUFFERED = '1'
PYTHON_BUILD_MIRROR_URL = '{% if env.CI is defined %}https://www.python.org/ftp/python/{% else %}https://mirrors.aliyun.com/python/{% endif %}'
RUBY_BUILD_MIRROR_URL = '{% if env.CI is defined %}https://cache.ruby-lang.org/pub/ruby/{% else %}https://mirrors.aliyun.com/ruby-build/{% endif %}'
RUSTUP_DIST_SERVER = '{% if env.CI is defined %}https://static.rust-lang.org{% else %}https://mirrors.aliyun.com/rustup{% endif %}'
RUSTUP_UPDATE_ROOT = '{% if env.CI is defined %}https://static.rust-lang.org/rustup{% else %}https://mirrors.aliyun.com/rustup/rustup{% endif %}'
UNIRTM_DISABLE_AQUA = '1'
UNIRTM_GO_DOWNLOAD_MIRROR = 'https://golang.google.cn/dl/'
UNIRTM_GO_SKIP_CHECKSUM = '{% if env.CI is defined %}0{% else %}1{% endif %}'
UNIRTM_NODE_COMPILE = '{% if env.ALPINE_VERSION is defined %}false{% endif %}'
UNIRTM_NODE_FLAVOR = '{% if env.ALPINE_VERSION is defined %}musl{% endif %}'
UNIRTM_NODE_MIRROR_URL = '{% if env.ALPINE_VERSION is defined %}https://unofficial-builds.nodejs.org/download/release/{% elif env.CI is defined %}https://nodejs.org/dist/{% else %}https://npmmirror.com/mirrors/node/{% endif %}'
UNIRTM_HOOK_ALLOW_MISSING = '1'

[tools]
'github:anchore/syft' = '1.44.0'
'github:aquasecurity/trivy' = '0.70.0'
'github:astral-sh/ruff' = '0.15.12'
'github:checkmake/checkmake' = 'v0.3.2'
'github:cli/cli' = "2.93.0"
'github:dotenv-linter/dotenv-linter' = '4.0.0'
'github:editorconfig-checker/editorconfig-checker' = "3.7.0"
'github:gitleaks/gitleaks' = '8.30.1'
'github:google/osv-scanner' = "2.3.8"
'github:hadolint/hadolint' = '2.14.0'
'github:koalaman/shellcheck' = '0.11.0'
'go:mvdan.cc/sh/v3/cmd/shfmt' = 'v3.13.1'
'github:rhysd/actionlint' = '1.7.12'
'github:zizmorcore/zizmor' = "1.25.2"
'github:goreleaser/goreleaser' = "2.16.0"
go = '1.26.4'
node = '26.3.0'
'npm:@commitlint/cli' = "21.0.2"
'npm:@commitlint/config-conventional' = "21.0.2"
'npm:@taplo/cli' = '0.7.0'
'npm:bats' = '1.13.0'
'npm:commitizen' = '4.3.1'
'npm:cz-conventional-changelog' = '3.3.0'
'npm:dockerfile-utils' = '0.16.3'
'npm:eslint' = "10.4.1"
'npm:markdownlint-cli2' = '0.17.2'

'npm:prettier' = '3.8.3'
'npm:sort-package-json' = "4.0.0"
'npm:stylelint' = "17.12.0"
'pipx:clang-format' = "22.1.5"
'pipx:pip-audit' = "2.10.0"
'pipx:pre-commit' = '4.6.0'
'pipx:yamllint' = '1.38.0'
python = '3.14.5'
'go:golang.org/x/vuln/cmd/govulncheck' = 'v1.1.4'

'go:golang.org/x/tools/cmd/goimports' = 'v0.30.0'
'go:github.com/golangci/golangci-lint/cmd/golangci-lint' = 'v1.64.4'
'go:github.com/securego/gosec/v2/cmd/gosec' = 'v2.22.1'

[tasks]
[tasks.audit]
description = 'Run comprehensive security audit sequentially'
run = '''
unirtm run audit:gitleaks
unirtm run audit:zizmor
unirtm run audit:osv
unirtm run audit:npm
unirtm run audit:pip
unirtm run audit:govulncheck
unirtm run audit:trivy
'''
output = 'interleaved'

[tasks."audit:gitleaks"]
description = 'Scan for hardcoded secrets'
run = 'unirtm exec -- gitleaks detect --source . --no-banner'
output = 'interleaved'

[tasks."audit:zizmor"]
description = 'Audit GitHub Actions workflows for security flaws'
run = '''
OFFLINE_FLAG="--offline"
if [ "${CI:-}" = "true" ] || [ "${GITHUB_ACTIONS:-}" = "true" ]; then
    OFFLINE_FLAG=""
fi

if [ "$UNIRTM_FIX" = "1" ]; then
    unirtm exec -- zizmor . --format plain --config .zizmor.yml $OFFLINE_FLAG --fix=all
else
    unirtm exec -- zizmor . --format plain --config .zizmor.yml $OFFLINE_FLAG
fi
'''
output = 'interleaved'

[tasks."audit:osv"]
description = 'Generic vulnerability scan across lockfiles'
run = '''
# Strategy 1: Environment-based routing (Local: Offline, CI: Online)
if [ "$CI" = "true" ] || [ "$GITHUB_ACTIONS" = "true" ]; then
    # CI Environment: Call API directly (fast, avoids large DB downloads)
    for i in 1 2 3; do
        if unirtm exec -- osv-scanner scan -r . --config .osv-scanner.toml --allow-no-lockfiles; then
            exit 0
        fi
        echo "⚠️  osv-scanner (Online) failed. Retrying ($i/3)..."
        sleep 2
    done
    exit 1
else
    # Local Environment: Use offline DB to prevent network timeouts
    for i in 1 2 3; do
        if unirtm exec -- osv-scanner scan -r . --config .osv-scanner.toml --offline-vulnerabilities --download-offline-databases --allow-no-lockfiles; then
            exit 0
        fi
        echo "⚠️  osv-scanner (Offline) failed. Retrying ($i/3)..."
        sleep 2
    done
    exit 1
fi
'''
output = 'interleaved'

[tasks."audit:npm"]
description = 'Node.js dependency audit'
run = '''
if [ -f "package.json" ]; then
    if [ "$UNIRTM_FIX" = "1" ]; then
        unirtm exec -- npm audit fix --registry=https://registry.npmjs.org
    else
        unirtm exec -- npm audit --registry=https://registry.npmjs.org
    fi
else
    echo "⏭️  Skipped (no package.json)"
fi
'''
output = 'interleaved'

[tasks."audit:pip"]
description = 'Python dependency audit'
run = '''
if [ -f "requirements.txt" ] || [ -f "pyproject.toml" ]; then
    if [ "$UNIRTM_FIX" = "1" ]; then
        unirtm exec -- pip-audit --fix
    else
        unirtm exec -- pip-audit
    fi
else
    echo "⏭️  Skipped (no python requirements)"
fi
'''
output = 'interleaved'

[tasks."audit:govulncheck"]
description = 'Go dependency audit'
run = '''
if [ -f "go.mod" ]; then
    unirtm exec -- govulncheck ./...
else
    echo "⏭️  Skipped (no go.mod)"
fi
'''
output = 'interleaved'

[tasks."audit:trivy"]
description = 'Generate and scan SBOM using Trivy'
run = '''
export TRIVY_SKIP_VERSION_CHECK="true"
export TRIVY_DB_REPOSITORY="public.ecr.aws/aquasecurity/trivy-db"
export TRIVY_JAVA_DB_REPOSITORY="public.ecr.aws/aquasecurity/trivy-java-db:1"
export TRIVY_CHECKS_BUNDLE_REPOSITORY="public.ecr.aws/aquasecurity/trivy-checks"

if [ "${CI:-}" = "true" ] || [ "${GITHUB_ACTIONS:-}" = "true" ]; then
    unirtm exec -- trivy fs --format cyclonedx --output sbom.json .
    unirtm exec -- trivy sbom sbom.json
else
    unirtm exec -- trivy fs --format cyclonedx --output sbom.json .
    # Try offline mode first. If missing DB, it will fail and we fallback to online.
    if ! unirtm exec -- trivy sbom --skip-db-update --skip-java-db-update --offline-scan sbom.json; then
        echo "⚠️  Local Trivy DB missing. Downloading from AWS ECR fallback..."
        unirtm exec -- trivy sbom sbom.json
    fi
fi
'''
output = 'interleaved'

[tasks.lint]
description = 'Fast lint: Check only modified files (staged & unstaged)'
run = '''
files=$(git ls-files -m -o --exclude-standard)
if [ -z "$files" ]; then
    echo '✨ No changed files to lint.'
else
    unirtm exec -- pre-commit run --files $files || {
        echo '⚠️  First pass failed. Running second check...'
        unirtm exec -- pre-commit run --files $files
    }
fi
'''
output = 'interleaved'

[tasks.lint-all]
description = 'Full lint: Check all project files (used in CI or verify)'
run = '''
unirtm exec -- pre-commit run --all-files || {
    echo '⚠️  First pass failed. Running second check...'
    unirtm exec -- pre-commit run --all-files
}
'''
output = 'interleaved'

[tasks.test]
description = 'Run Go unit tests for all packages recursively'
# -timeout 10m : prevent a single hung test from consuming the entire CI budget (default: 10m)
# -p 4         : limit the number of packages compiled/tested in parallel to prevent CI OOM
#                (GitHub Actions ubuntu-latest has ~7GB RAM; -race multiplies usage 5-10x)
# CGO_ENABLED=0: force pure-Go build — all test files must use modernc.org/sqlite, not mattn/go-sqlite3
# run = 'unirtm exec -- go test -cover -v -timeout 10m -p 4 ./...'
run = 'unirtm exec -- unirtm version'
output = 'interleaved'
env = { GOTOOLCHAIN = 'local', CGO_ENABLED = '0' }

[tasks."test:shell"]
description = 'Run Bats tests for install.sh'
run = 'unirtm exec -- bats tests/install.bats'
output = 'interleaved'

[tasks."test:powershell"]
description = 'Run Pester tests for install.ps1'
# Encoded equivalent of:
#   $c = New-PesterConfiguration
#   $c.Run.Path = 'tests/install.Tests.ps1'
#   $c.Run.Exit = $true
#   Invoke-Pester -Configuration $c
run = 'pwsh -NoProfile -EncodedCommand '
output = 'interleaved'

[tasks.verify]
description = 'Run full local verification sequentially (lint-all, test, audit) to prevent CI OOM'
run = '''
unirtm run lint-all
unirtm run test
unirtm run audit
'''
output = 'interleaved'

[tasks."audit:trivy-update"]
description = 'Update Trivy vulnerability databases locally'
run = '''
export TRIVY_DB_REPOSITORY="public.ecr.aws/aquasecurity/trivy-db"
export TRIVY_JAVA_DB_REPOSITORY="public.ecr.aws/aquasecurity/trivy-java-db:1"
export TRIVY_CHECKS_BUNDLE_REPOSITORY="public.ecr.aws/aquasecurity/trivy-checks"

echo "Downloading main vulnerability DB..."
unirtm exec -- trivy image --download-db-only

echo "Downloading Java index DB..."
unirtm exec -- trivy image --download-java-db-only
'''
output = 'interleaved'

[settings]
cache_dir = ''
cache_ttl = 86400
jobs = 0
data_dir = ''
